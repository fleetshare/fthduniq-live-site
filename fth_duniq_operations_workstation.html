async function loadFromApi(){
  let savedBefore = {};
  try{
    savedBefore = JSON.parse(localStorage.getItem(KEY) || '{}');
  }catch(e){
    savedBefore = {};
  }

  try{
    const res = await fetch(API_RECORDS + '?t=' + Date.now(), { cache: 'no-store' });

    if(!res.ok){
      return;
    }

    const payload = await res.json();
    const arr = Array.isArray(payload) ? payload : (payload.records || payload.data || []);

    const fresh = blank();

    arr.forEach(row => {
      let data = row.data || row.record || row;

      try{
        if(typeof data === 'string'){
          data = JSON.parse(data);
        }
      }catch(e){}

      try{
        if(row.data_json){
          data = JSON.parse(row.data_json);
        }
      }catch(e){}

      const type = row.type || data._cloudType || data.type;

      if(!type || !TYPE_COLLECTION[type]){
        return;
      }

      data._cloudId = row.id || data._cloudId || data.id;
      data._cloudType = type;
      data._cloudSynced = true;

      fresh[TYPE_COLLECTION[type]].push(data);
    });

    if((!fresh.officers || !fresh.officers.length) && savedBefore.officers && Array.isArray(savedBefore.officers)){
      fresh.officers = savedBefore.officers;
    }

    db = fresh;
    localStorage.setItem(KEY, JSON.stringify(db));

  }catch(e){
    console.warn('Unable to load shared records:', e);
  }
}

async function clearOperationalData(){
  if(currentRole!=='director')return alert('Only Director can clear workstation data.');
  const confirmText=prompt('This will clear operational records but keep officer access tokens. Type CLEAR to continue.');
  if(confirmText!=='CLEAR'){alert('Clear action cancelled.');return}
  let savedBefore={};
  try{savedBefore=JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){savedBefore={}}
  try{
    for(let round=0;round<3;round++){
      const res=await fetch(API_RECORDS+'?t='+Date.now(),{cache:'no-store'});
      const payload=await res.json();
      const records=Array.isArray(payload)?payload:(payload.records||payload.data||[]);
      if(!records.length)break;
      for(const record of records){
        let recordType=record.type||'';
        try{if(!recordType&&record.data_json){const parsed=JSON.parse(record.data_json);recordType=parsed._cloudType||parsed.type||''}}catch(e){}
        if(!recordType&&record.data)recordType=record.data._cloudType||record.data.type||'';
        if(recordType==='officer')continue;
        if(record.id!==undefined&&record.id!==null){await fetch(API_RECORDS+'/'+encodeURIComponent(record.id),{method:'DELETE'})}
      }
    }
    db=blank();
    if(savedBefore.officers&&Array.isArray(savedBefore.officers))db.officers=savedBefore.officers;
    localStorage.setItem(KEY,JSON.stringify(db));
    alert('Operational records have been cleared. Officer access tokens were kept. Other officers should refresh, log out, and log in again.');
    showPage('dashboard');
  }catch(error){alert('Unable to clear shared records. Please check the connection and try again.');console.error(error)}
}

async function refreshThisDeviceFromCloud(){
  if(!confirm('This will clear only this device cache and reload the latest shared workstation records. Continue?')){
    return;
  }
  try{
    sessionStorage.removeItem('fth_active_page');
    Object.keys(localStorage).forEach(function(k){
      const key=k.toLowerCase();
      if(key.includes('fth')||key.includes('duniq')||key.includes('workstation')){
        localStorage.removeItem(k);
      }
    });
    db=blank();
    localStorage.setItem(KEY,JSON.stringify(db));
    await loadFromApi();
    alert('This device has been refreshed from the shared workstation records.');
    showPage('dashboard');
  }catch(error){
    alert('Unable to refresh this device. Please check the connection and try again.');

  }

document.getElementById('loginForm').onsubmit=async function(e){
  e.preventDefault();
  const role=document.getElementById('role').value;
  const token=document.getElementById('pin').value.trim();
  const duty=document.getElementById('officerDutyName').value.trim();
  const msg=document.getElementById('loginMsg');

  msg.textContent='Checking access...';

  try{
    await Promise.race([
      loadFromApi(),
      new Promise(resolve=>setTimeout(resolve,2000))
    ]);
  }catch(error){}

  const officer=verifyLogin(role,token);
  if(!officer){
    msg.textContent='Invalid role or access token. Please confirm the role and token assigned to this officer.';
    return;
  }

  currentRole=role;
  currentOfficerName=duty||officer.name||roleNames[role];
  currentOfficerId=officer.id||'';
  currentLoginTime=new Date().toLocaleString('en-NG');

  sessionStorage.setItem('fth_login',JSON.stringify({
    role:currentRole,
    officerName:currentOfficerName,
    officerId:currentOfficerId,
    loginTime:currentLoginTime
  }));

  msg.textContent='Opening workstation...';
  startApp();
};
