async function clearOperationalData(){
  if(currentRole !== 'director'){
    return alert('Only Director can clear workstation data.');
  }

  const confirmText = prompt(
    'This will clear all shared workstation records and reset local workstation cache. Type CLEAR to continue.'
  );

  if(confirmText !== 'CLEAR'){
    alert('Clear action cancelled.');
    return;
  }

  try{
    // Delete records from the shared database
    for(let round = 0; round < 3; round++){
      const res = await fetch(API_RECORDS + '?t=' + Date.now(), { cache: 'no-store' });
      const payload = await res.json();
      const records = Array.isArray(payload) ? payload : (payload.records || payload.data || []);

      if(!records.length){
        break;
      }

      for(const record of records){
        if(record.id !== undefined && record.id !== null){
          await fetch(API_RECORDS + '/' + encodeURIComponent(record.id), {
            method: 'DELETE'
          });
        }
      }
    }

    // Clear current device cache
    db = blank();

    Object.keys(localStorage).forEach(function(k){
      const key = k.toLowerCase();
      if(key.includes('fth') || key.includes('duniq') || key.includes('workstation')){
        localStorage.removeItem(k);
      }
    });

    localStorage.setItem(KEY, JSON.stringify(db));

    alert('Workstation records have been cleared. Other officers must refresh, log out, and log in again.');

    showPage('dashboard');

  }catch(error){
    alert('Unable to clear shared records. Please check the connection and try again.');
    console.error(error);
  }
}

}

async function startApp(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';

  document.getElementById('roleName').textContent=roleNames[currentRole] || currentRole;
  document.getElementById('officerChip').textContent='Officer: '+currentOfficerName;
  document.getElementById('dateNow').textContent='Login: '+currentLoginTime;

  renderNav();

  // Open the workstation first so login does not hang
  showPage('dashboard');

  // Then load shared records quietly in the background
  try{
    await loadFromApi();
    showPage('dashboard');
  }catch(error){
    console.warn('Shared records could not load immediately:', error);
  }

  try{
    queueSync();
  }catch(error){}
}

async function clearOperationalData(){
  if(currentRole !== 'director'){
    return alert('Only Director can clear workstation data.');
  }

  const confirmText = prompt(
    'This will clear all shared workstation records for all officers. Type CLEAR to continue.'
  );

  if(confirmText !== 'CLEAR'){
    alert('Clear action cancelled.');
    return;
  }

  try{
    const res = await fetch(API_RECORDS, { cache: 'no-store' });
    const payload = await res.json();
    const records = Array.isArray(payload) ? payload : (payload.records || payload.data || []);

    for(const record of records){
      if(record.id !== undefined && record.id !== null){
        await fetch(API_RECORDS + '/' + encodeURIComponent(record.id), {
          method: 'DELETE'
        });
      }
    }

    db = blank();
    localStorage.setItem(KEY, JSON.stringify(db));

    alert('Workstation records have been cleared. Other officers should refresh or log out and log in again.');
    showPage('dashboard');

  }catch(error){
    alert('Unable to clear shared records. Please check the connection and try again.');
    console.error(error);
  }
}
function renderArchivePage(){installPage('<section><div class="panel"><div class="eyebrow">Director Archive</div><h2>Archived Reports</h2>'+table(db.archives,['Date','Archive ID','Type','Title','Action'],a=>[niceDate(a.date),a.id,esc(a.type),esc(a.title),'<button class="small secondary" onclick="printArchive(\''+a.id+'\')">Print</button>'],'No archived report yet.')+'</div></section>')}
function printArchive(aid){const a=db.archives.find(x=>x.id===aid);if(a)printWin(a.html,a.title)}
function docHeader(title,ref){return '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:18px;border-bottom:4px solid #d4a62a;padding-bottom:14px;margin-bottom:20px"><div style="display:flex;align-items:center;gap:16px"><img src="'+LOGO_PATH+'" style="width:82px;height:82px;object-fit:contain"><div><h1 style="margin:0;font-family:Cormorant Garamond,serif;font-size:38px">FTH D-UNIQ</h1><b>'+title+'</b><br><span>'+ref+'</span><br><span>'+COMPANY_BN+'</span></div></div><div style="font-size:12px;line-height:1.65;text-align:right;max-width:280px"><b>WhatsApp:</b> '+COMPANY_WHATSAPP+'<br><b>Email:</b> '+COMPANY_EMAIL+'<br><b>Website:</b> '+COMPANY_WEBSITE+'<br><b>Address:</b> '+COMPANY_ADDRESS+'<br><b>Site:</b> '+COMPANY_SITE_LOCATION+'</div></div>'}
function accountBlock(){return '<div class="table"><table><tr><th colspan="2">Primary Payment Account</th></tr><tr><th>Bank Name</th><td>'+esc(COMPANY_BANK_NAME)+'</td></tr><tr><th>Account Name</th><td>'+esc(COMPANY_ACCOUNT_NAME)+'</td></tr><tr><th>Account Number</th><td>'+esc(COMPANY_ACCOUNT_NUMBER)+'</td></tr><tr><th colspan="2">Alternative Payment Account</th></tr><tr><th>Bank / App</th><td>'+esc(COMPANY_ALT_BANK_NAME)+'</td></tr><tr><th>Account Name</th><td>'+esc(COMPANY_ALT_ACCOUNT_NAME)+'</td></tr><tr><th>Account Number</th><td>'+esc(COMPANY_ALT_ACCOUNT_NUMBER)+'</td></tr><tr><th>Payment Remark</th><td>Use invoice number/customer name as payment reference and send proof of payment to FTH D-UNIQ for confirmation.</td></tr></table></div>'}
function sigBlock(label,data,name){return '<div style="border:1px solid #ddd;border-radius:12px;padding:12px;margin-top:12px"><b>'+esc(label)+'</b><br>'+(name?'<span>'+esc(name)+'</span><br>':'')+(data?'<img src="'+data+'" style="width:100%;max-width:260px;height:85px;object-fit:contain;border-bottom:1px solid #333;margin-top:8px">':'<div style="height:85px;border-bottom:1px solid #333"></div>')+'</div>'}
function stampBlock(){return '<div style="border:1px solid #ddd;border-radius:12px;padding:12px;margin-top:12px;text-align:center"><b>Company Stamp</b><br><img src="'+STAMP_PATH+'" style="max-width:160px;height:95px;object-fit:contain;margin-top:8px" onerror="this.style.display=\'none\'"></div>'}
function invoiceHtml(iid){const i=db.invoices.find(x=>x.id===iid);if(!i)return'';return '<div class="panel">'+docHeader('CUSTOMER INVOICE',i.id)+'<p><b>Customer:</b> '+esc(i.customer)+'<br><b>Phone:</b> '+esc(i.phone)+'<br><b>Location:</b> '+esc(i.location)+'<br><b>Delivery Date:</b> '+niceDate(i.deliveryDate)+'<br><b>Delivery Time:</b> '+esc(i.deliveryTime||'To be confirmed')+'<br><b>Delivery Window:</b> '+esc(i.deliveryWindow||'To be confirmed')+'</p>'+table(i.lines,['Description','Qty','Unit','Rate','Amount'],l=>[esc(l.desc),num(l.qty),esc(l.unit),money(l.rate),money(l.amount)])+'<div class="table"><table><tr><td>Subtotal</td><td>'+money(i.subtotal)+'</td></tr><tr><td>Logistics / Delivery Fee</td><td>'+money(i.logisticsFee)+'</td></tr><tr><td>Discount</td><td>'+money(i.discount)+'</td></tr><tr><th>Grand Total</th><th>'+money(i.total)+'</th></tr><tr><td>Paid</td><td>'+money(i.paid)+'</td></tr><tr><th>Balance</th><th>'+money(i.balance)+'</th></tr></table></div><h3>Payment Details</h3>'+accountBlock()+'<div class="notice"><b>Terms / Refund Notice:</b><br>'+esc(REFUND_NOTICE)+'</div>'+sigBlock('Officer Signature',i.officerSignatureData,i.createdByName)+stampBlock()+'</div>'}
function receiptHtml(rid){const r=db.receipts.find(x=>x.id===rid);if(!r)return'';return '<div class="panel">'+docHeader(r.receiptType.toUpperCase(),r.id)+'<p><b>Customer:</b> '+esc(r.customer)+'<br><b>Invoice:</b> '+esc(r.invoiceId)+'<br><b>Delivery Date:</b> '+niceDate(r.deliveryDate)+'<br><b>Delivery Time:</b> '+esc(r.deliveryTime||'To be confirmed')+'<br><b>Delivery Window:</b> '+esc(r.deliveryWindow||'To be confirmed')+'</p><div class="table"><table><tr><td>Transfer Amount</td><td>'+money(r.transferAmount)+'</td></tr><tr><td>Cash Amount</td><td>'+money(r.cashAmount)+'</td></tr><tr><td>POS Amount</td><td>'+money(r.posAmount)+'</td></tr><tr><th>Total Paid</th><th>'+money(r.amount)+'</th></tr><tr><th>Balance</th><th>'+money(r.balance)+'</th></tr></table></div><div class="notice"><b>Terms / Refund Notice:</b><br>'+esc(REFUND_NOTICE)+'</div>'+stampBlock()+'</div>'}
function waybillHtml(wid){const w=db.waybills.find(x=>x.id===wid);if(!w)return'';return '<div class="panel">'+docHeader('DELIVERY WAYBILL',w.id)+'<div class="table"><table><tr><th>Invoice</th><td>'+esc(w.invoiceId)+'</td></tr><tr><th>Customer</th><td>'+esc(w.customer)+'</td></tr><tr><th>Phone</th><td>'+esc(w.phone)+'</td></tr><tr><th>Delivery Location</th><td>'+esc(w.location)+'</td></tr><tr><th>Delivery Date</th><td>'+niceDate(w.deliveryDate)+'</td></tr><tr><th>Delivery Time / Window</th><td>'+esc(w.deliveryTime||'To be confirmed')+' / '+esc(w.deliveryWindow||'To be confirmed')+'</td></tr><tr><th>Products / Materials</th><td>'+esc(w.products).split('\n').join('<br>')+'</td></tr><tr><th>Status</th><td>'+esc(w.status)+'</td></tr></table></div><h3>Signatures</h3><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px">'+sigBlock('Company / Officer',w.officerSignatureData,w.companySigner)+sigBlock('Driver',w.driverSignatureData,w.driverSigner)+sigBlock('Customer / Site Receiver',w.customerSignatureData,w.customerSigner)+'</div>'+stampBlock()+'</div>'}
function approvalDetails(type,idv){if(type==='invoice')return invoiceHtml(idv);if(type==='waybill')return waybillHtml(idv);if(type==='payment'){const p=db.payments.find(x=>x.id===idv);if(!p)return'';return '<div class="panel">'+docHeader('PAYMENT APPROVAL REVIEW',p.id)+'<div class="table"><table><tr><th>Invoice</th><td>'+esc(p.invoiceId)+'</td></tr><tr><th>Customer</th><td>'+esc(p.customer)+'</td></tr><tr><th>Transfer</th><td>'+money(p.transferAmount)+'</td></tr><tr><th>Cash</th><td>'+money(p.cashAmount)+'</td></tr><tr><th>POS</th><td>'+money(p.posAmount)+'</td></tr><tr><th>Total Paid</th><td>'+money(p.totalPaid)+'</td></tr><tr><th>Proof</th><td>'+(p.proofName?'<a href="'+p.proofData+'" target="_blank">'+esc(p.proofName)+'</a>':'-')+'</td></tr></table></div></div>'}if(type==='procRequest'){const r=db.procurementRequests.find(x=>x.id===idv);if(!r)return'';return '<div class="panel">'+docHeader('PROCUREMENT SOURCING REQUEST',r.id)+'<div class="table"><table><tr><th>Quote</th><td>'+esc(r.quoteId)+'</td></tr><tr><th>Customer</th><td>'+esc(r.customer)+'</td></tr><tr><th>Product</th><td>'+esc(r.itemName)+'</td></tr><tr><th>Quantity</th><td>'+esc(r.qty)+' '+esc(r.unit)+'</td></tr><tr><th>Location</th><td>'+esc(r.location)+'</td></tr><tr><th>Request Note</th><td>'+esc(r.requestNote||'-')+'</td></tr></table></div></div>'}if(type==='procurement'){const p=db.procurement.find(x=>x.id===idv);if(!p)return'';return '<div class="panel">'+docHeader('PROCUREMENT FEEDBACK REVIEW',p.id)+'<div class="table"><table><tr><th>Source Type</th><td>'+esc(p.layer)+'</td></tr><tr><th>Vendor</th><td>'+esc(p.vendor||'-')+'</td></tr><tr><th>Product</th><td>'+esc(p.itemName||p.item||'-')+'</td></tr><tr><th>Cost</th><td>'+money(p.costPrice||0)+'</td></tr><tr><th>Suggested Selling Price</th><td>'+money(p.sellingPrice||0)+'</td></tr><tr><th>Feedback</th><td>'+esc(p.feedbackToSupport||p.notes||'-')+'</td></tr></table></div></div>'}return''}
function viewApproval(type,idv){let modal=document.getElementById('approvalReviewModal');if(!modal){modal=document.createElement('div');modal.id='approvalReviewModal';modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:none;padding:20px;overflow:auto';document.body.appendChild(modal)}const approve={invoice:'approveInvoice',payment:'approvePayment',waybill:'approveWaybill',procRequest:'approveProcRequest',procurement:'approveProcurement'};const reject={invoice:'rejectInvoice',payment:'rejectPayment',procRequest:'rejectProcRequest',procurement:'rejectProcurement'};modal.innerHTML='<div style="background:#fff;max-width:1050px;margin:20px auto;padding:22px;border-radius:18px"><div style="display:flex;justify-content:space-between;gap:14px"><h2>Open / View Approval Details</h2><button class="small red" onclick="document.getElementById(\'approvalReviewModal\').style.display=\'none\'">Close</button></div>'+approvalDetails(type,idv)+'<div class="row"><button class="small green" onclick="'+approve[type]+'(\''+idv+'\');document.getElementById(\'approvalReviewModal\').style.display=\'none\'">I have reviewed — Approve / Proceed</button>'+(reject[type]?'<button class="small red" onclick="'+reject[type]+'(\''+idv+'\');document.getElementById(\'approvalReviewModal\').style.display=\'none\'">Reject / Return</button>':'')+'</div></div>';modal.style.display='block'}
function printInvoice(iid){const i=db.invoices.find(x=>x.id===iid);if(!i||i.status==='Awaiting Director Approval'||i.status==='Rejected')return alert('Invoice must be approved before printing.');printWin(invoiceHtml(iid),'Invoice '+iid)}
function printReceipt(rid){printWin(receiptHtml(rid),'Receipt '+rid)}
function printWaybill(wid){const w=db.waybills.find(x=>x.id===wid);if(!w||w.status==='Awaiting Director Approval')return alert('Waybill must be approved before printing.');printWin(waybillHtml(wid),'Waybill '+wid)}
function printWin(content,title){
  const w = window.open('', '_blank');

  const js = '<scr'+'ipt>window.onload=function(){setTimeout(function(){window.print()},400)}</scr'+'ipt>';

  w.document.write(
    '<html><head><title>'+esc(title)+'</title>'+
    '<style>'+
      '@page{size:A4;margin:14mm;}'+
      'body{font-family:Arial,sans-serif;margin:0;padding:0;color:#1b1714;}'+
      '.panel{max-width:900px;margin:auto;}'+
      'h1,h2,h3{margin-top:0;}'+
      'p{font-size:12px;line-height:1.55;}'+
      'table{width:100%;border-collapse:collapse;font-size:11px;}'+
      'th,td{border:1px solid #999;padding:7px;text-align:left;vertical-align:top;}'+
      'th{background:#eee;}'+
      '.notice{border:1px solid #d4a62a;padding:10px;border-radius:8px;margin-top:10px;font-size:11px;line-height:1.5;}'+
      'img{max-width:120px;height:auto;}'+
      '.document-logo{width:55px!important;max-width:55px!important;height:auto!important;}'+
      '@media print{button{display:none!important;} img{max-width:120px!important;height:auto!important;}}'+
    '</style></head><body>'+content+js+'</body></html>'
  );

  w.document.close();
}
function openWhatsAppInvoice(iid){const i=db.invoices.find(x=>x.id===iid);if(!i)return;const msg='Good day '+(i.customer||'Customer')+', kindly find attached your invoice from FTH D-UNIQ.\n\nInvoice No: '+i.id+'\nTotal Amount: '+money(i.total)+'\nAmount Paid: '+money(i.paid)+'\nBalance: '+money(i.balance)+'\nDelivery Date: '+(i.deliveryDate?niceDate(i.deliveryDate):'To be confirmed')+'\nDelivery Time / Window: '+(i.deliveryTime||'To be confirmed')+' / '+(i.deliveryWindow||'To be confirmed')+'\n\nPlease review the invoice details and make payment to the account details stated on the invoice. After payment, kindly send proof of payment for confirmation.\n\nNote to officer: attach the downloaded/printed invoice PDF before sending to the client.\n\nThank you for choosing FTH D-UNIQ.';window.open('https://wa.me/'+wnum(i.phone)+'?text='+encodeURIComponent(msg),'_blank')}
function openWhatsAppReceipt(rid){const r=db.receipts.find(x=>x.id===rid);if(!r)return;const msg='Good day '+(r.customer||'Customer')+', kindly find attached your payment receipt / part-payment acknowledgement from FTH D-UNIQ.\n\nReceipt No: '+r.id+'\nInvoice No: '+r.invoiceId+'\nAmount Paid: '+money(r.amount)+'\nBalance: '+money(r.balance)+'\n\nPlease keep this receipt for your records.\n\nNote to officer: attach the downloaded/printed receipt PDF before sending to the client.\n\nThank you for choosing FTH D-UNIQ.';window.open('https://wa.me/'+wnum(r.phone)+'?text='+encodeURIComponent(msg),'_blank')}
function deleteRecord(collection,idv){if(!db[collection])return;if(currentRole!=='director'&&!['quotes','stock','followups'].includes(collection))return alert('Only Director can delete approved or sensitive records.');if(!confirm('Delete/correct this record?'))return;db[collection]=db[collection].filter(x=>x.id!==idv);save()}
function deleteLogisticsForWaybill(wid){if(!(currentRole==='director'||currentRole==='logistics'))return;if(!confirm('Delete logistics updates for this waybill?'))return;db.logistics=db.logistics.filter(x=>x.waybillId!==wid);save()}
function setupSignaturePad(canvasId,clearId,hiddenId){const c=document.getElementById(canvasId),btn=document.getElementById(clearId),h=document.getElementById(hiddenId);if(!c||!btn||!h)return;const ctx=c.getContext('2d');let drawing=false,x=0,y=0;const row=document.createElement('div');row.className='signature-control-row';row.style.cssText='display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:8px 0;font-size:12px';row.innerHTML='<label>Pen Colour</label><select class="signature-colour"><option value="#000000">Black</option><option value="#1f4eaa" selected>Blue</option><option value="#b78622">Gold</option><option value="#8b0000">Red</option></select><label>Thickness</label><select class="signature-thickness"><option value="2">Light</option><option value="2.5" selected>Medium</option><option value="4">Bold</option></select>';c.parentElement.insertBefore(row,c);row.querySelector('.signature-colour').onchange=e=>signaturePenColor=e.target.value;row.querySelector('.signature-thickness').onchange=e=>signatureLineWidth=Number(e.target.value||2.5);function resize(){const saved=h.value,r=c.getBoundingClientRect(),ratio=window.devicePixelRatio||1;if(!r.width||!r.height)return;c.width=r.width*ratio;c.height=r.height*ratio;ctx.setTransform(ratio,0,0,ratio,0,0);ctx.lineWidth=signatureLineWidth;ctx.lineCap='round';ctx.strokeStyle=signaturePenColor;if(saved){const img=new Image();img.onload=()=>ctx.drawImage(img,0,0,r.width,r.height);img.src=saved}}function pos(e){const r=c.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}function start(e){resize();e.preventDefault();drawing=true;const p=pos(e);x=p.x;y=p.y}function move(e){if(!drawing)return;e.preventDefault();ctx.strokeStyle=signaturePenColor;ctx.lineWidth=signatureLineWidth;const p=pos(e);ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(p.x,p.y);ctx.stroke();x=p.x;y=p.y;h.value=c.toDataURL('image/png')}function stop(){if(!drawing)return;drawing=false;h.value=c.toDataURL('image/png')}btn.onclick=()=>{ctx.clearRect(0,0,c.width,c.height);h.value=''};c.addEventListener('pointerdown',start);c.addEventListener('pointermove',move);c.addEventListener('pointerup',stop);c.addEventListener('pointerleave',stop);c.addEventListener('pointercancel',stop);signaturePads.push({resize});resize()}
function resizeAllSignaturePads(){signaturePads.forEach(p=>p.resize())}window.addEventListener('resize',resizeAllSignaturePads);
document.addEventListener('contextmenu',e=>{if(!e.target.closest('input,textarea,select,button,a,summary,canvas'))e.preventDefault()});document.addEventListener('copy',e=>{if(!e.target.closest('input,textarea'))e.preventDefault()});
const oldLogin=sessionStorage.getItem('fth_login');if(oldLogin){try{const l=JSON.parse(oldLogin);if(l.role){currentRole=l.role;currentOfficerName=l.officerName||roleNames[l.role];currentOfficerId=l.officerId||'';currentLoginTime=l.loginTime||new Date().toLocaleString('en-NG');startApp()}}catch(e){}}
</script>
