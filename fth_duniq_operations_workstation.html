function verifyLogin(role,token){const t=String(token||'').trim();const exact=db.officers.find(o=>o.role===role&&String(o.token).trim()===t&&o.status==='Active');if(exact)return exact;if(defaultPins[role]===t)return{id:'default-'+role,role:role,name:roleNames[role],token:t,status:'Active'};return null}

async function apiSave(type,data){try{const payload={type,status:data.status||data.directorApprovalStatus||'Saved',customer_name:data.customer||data.name||'',customer_phone:data.phone||'',created_by_role:data.createdByRole||currentRole,created_by_name:data.createdByName||currentOfficerName,data};const isUpdate=!!data._cloudId;const res=await fetch(isUpdate?API_RECORDS+'/'+encodeURIComponent(data._cloudId):API_RECORDS,{method:isUpdate?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const out=await res.json().catch(()=>({}));if(res.ok){data._cloudId=out.id||out.business_ref||data._cloudId||data.id;data._cloudType=type;data._cloudSynced=true;localSave()}}catch(e){}}
async function syncAllToApi(){for(const [collection,type] of Object.entries(COLLECTION_TYPE)){for(const item of db[collection]||[]){await apiSave(type,item)}}}
async function deleteAllCloudOperationalRecords(){
  let clearedByEndpoint = false;

  // First, use the proper backend clear endpoint. This is the permanent shared clear.
  for(const endpoint of API_CLEAR_ENDPOINTS){
    try{
      const res = await fetch(endpoint, {
        method:'DELETE',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ passcode: defaultPins.director })
      });
      if(res.ok){
        clearedByEndpoint = true;
      }
    }catch(e){
      console.warn('Clear endpoint failed:', endpoint, e);
    }
  }

  // Fallback: delete records one by one if the Worker has individual DELETE support.
  try{
    for(let round=0; round<3; round++){
      const res = await fetch(API_RECORDS+'?t='+Date.now(), {cache:'no-store'});
      if(!res.ok) break;
      const payload = await res.json();
      const records = Array.isArray(payload) ? payload : (payload.records || payload.data || []);
      if(!records.length) break;
      for(const record of records){
        let data = record.data || record.record || record;
        try{ if(typeof data==='string') data=JSON.parse(data); }catch(e){}
        try{ if(record.data_json) data=JSON.parse(record.data_json); }catch(e){}
        const type = inferRowType(record,data);
        if(type==='officer') continue;
        if(record.id!==undefined && record.id!==null){
          await fetch(API_RECORDS+'/'+encodeURIComponent(record.id), {method:'DELETE'});
        }
      }
    }
  }catch(e){
    console.warn('Individual cloud delete fallback failed:', e);
  }

  // Confirm cloud is now empty of operational records.
  try{
    const check = await fetch(API_RECORDS+'?t='+Date.now(), {cache:'no-store'});
    if(check.ok){
      const payload = await check.json();
      const records = Array.isArray(payload) ? payload : (payload.records || payload.data || []);
      const operationalRecords = records.filter(record=>{
        let data = record.data || record.record || record;
        try{ if(typeof data==='string') data=JSON.parse(data); }catch(e){}
        try{ if(record.data_json) data=JSON.parse(record.data_json); }catch(e){}
        const type = inferRowType(record,data);
        return type && type !== 'officer';
      });
      return operationalRecords.length === 0;
    }
  }catch(e){
    console.warn('Cloud clear verification failed:', e);
  }

  return clearedByEndpoint;
}

async function authorizedClearWorkstationData(){
  const pass = prompt('Enter Director clear passcode to clear this workstation data.');
  if(!directorPassIsValid(pass)){
    alert('Wrong Director clear passcode. Data was not cleared.');
    return;
  }

  const confirmText = prompt('Type CLEAR to confirm. This clears shared cloud records and this device.');
  if(confirmText !== 'CLEAR'){
    alert('Clear action cancelled.');
    return;
  }

  clearInterval(pullTimer);

  let savedOfficers = db.officers || [];
  try{
    const before = JSON.parse(localStorage.getItem(KEY)||'{}');
    if(before.officers && Array.isArray(before.officers)) savedOfficers = before.officers;
  }catch(e){}

  const cloudCleared = await deleteAllCloudOperationalRecords();

  db = blank();
  db.officers = savedOfficers;
  localStorage.setItem(KEY, JSON.stringify(db));
  renderCurrentPage();

  if(cloudCleared){
    alert('Shared workstation records have been cleared successfully. Other officers will see empty records after refresh or auto-sync.');
    startAutoPull();
  }else{
    alert('This device has been cleared, but the cloud database may still contain old records. Please update the Cloudflare Worker clear route before turning auto-sync back on.');
  }
}

async function loadFromApi(){
  try{
    const savedBefore = (()=>{try{return JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){return {}}})();
    const res = await fetch(API_RECORDS + '?t=' + Date.now(), { cache:'no-store' });
    if(!res.ok){
      console.warn('Cloud records not available');
      return false;
    }
    const payload = await res.json();
    const records = Array.isArray(payload) ? payload : (payload.records || payload.data || []);
    const fresh = blank();
    records.forEach(row=>{
      let data = row.data || row.record || row;
      try{ if(typeof data === 'string') data = JSON.parse(data); }catch(e){}
      try{ if(row.data_json) data = JSON.parse(row.data_json); }catch(e){}
      const type = row.type || data._cloudType || data.type;
      if(!type || !TYPE_COLLECTION[type]) return;
      data._cloudId = row.id || data._cloudId || data.id;
      data._cloudType = type;
      data._cloudSynced = true;
      fresh[TYPE_COLLECTION[type]].push(data);
    });
    // Keep local officer tokens if the cloud returns no officer records.
    if((!fresh.officers || !fresh.officers.length) && savedBefore.officers && Array.isArray(savedBefore.officers)){
      fresh.officers = savedBefore.officers;
    }
    db = fresh;
    localStorage.setItem(KEY, JSON.stringify(db));
    return true;
  }catch(error){
    console.warn('Unable to load cloud records:', error);
    return false;
  }
}

}

document.getElementById('loginForm').onsubmit = async function(e){
  e.preventDefault();
  const role = document.getElementById('role').value;
  const token = document.getElementById('pin').value.trim();
  const duty = document.getElementById('officerDutyName').value.trim();
  const msg = document.getElementById('loginMsg');

  msg.textContent = 'Checking access...';

  // Cloud loading must never block login. It only helps fetch custom officer tokens.
  try{
    await Promise.race([
      loadFromApi(),
      new Promise(resolve=>setTimeout(resolve,1200))
    ]);
  }catch(e){
    console.warn('Login cloud check skipped:', e);
  }

  const officer = verifyLogin(role, token);
  if(!officer){
    msg.textContent = 'Invalid role or access token. Please confirm the role and token assigned to this officer.';
    return;
  }

  currentRole = role;
  currentOfficerName = duty || officer.name || roleNames[role];
  currentOfficerId = officer.id || '';
  currentLoginTime = new Date().toLocaleString('en-NG');

  sessionStorage.setItem('fth_login', JSON.stringify({
    role: currentRole,
    officerName: currentOfficerName,
    officerId: currentOfficerId,
    loginTime: currentLoginTime
  }));

  msg.textContent = 'Opening workstation...';
  startApp();
};

async function savePayment(e){e.preventDefault();const f=e.target,data=formData(f),inv=db.invoices.find(i=>i.id===data.invoiceId);if(!inv)return alert('Select a valid approved invoice.');const transferAmount=Number(data.transferAmount||0),cashAmount=Number(data.cashAmount||0),posAmount=Number(data.posAmount||0),totalPaid=transferAmount+cashAmount+posAmount;if(totalPaid<=0)return alert('Enter at least one payment amount.');const proof=await fileRead(f.proof.files[0]);const p={id:nextId('payment'),status:currentRole==='director'?'Approved':'Awaiting Director Approval',invoiceId:inv.id,customer:inv.customer,phone:inv.phone,totalPaid,transferAmount,cashAmount,posAmount,proofName:proof.name,proofData:proof.data,createdByName:currentOfficerName,...data};db.payments.unshift(p);if(currentRole==='director')applyApprovedPayment(p,inv);save();alert(currentRole==='director'?'Payment saved and approved. Receipt generated.':'Payment submitted for Director approval.')}

function renderFollowupPage(){installPage('<section><div class="panel"><div class="eyebrow">Client Follow-Up</div><h2>Customer Follow-Up Desk</h2><form id="followupForm"><div class="grid"><div><label>Select Existing Customer</label><select id="followupCustomerSelect">'+customerOptions()+'</select></div><div><label>Date</label><input name="date" type="date" required></div><div><label>Customer Name</label><input name="customer" required></div><div><label>Phone / WhatsApp</label><input name="phone"></div><div><label>Message Channel</label><select name="channel"><option>WhatsApp</option><option>SMS</option><option>Email</option><option>Phone Call</option></select></div><div><label>Follow-Up Purpose / Template</label><select name="purpose" id="followupPurpose">'+Object.keys(followupTemplates()).map(k=>'<option>'+k+'</option>').join('')+'</select></div><div><label>Outcome</label><select name="outcome"><option>Message Prepared</option><option>Message Sent</option><option>Customer Replied</option><option>Customer Did Not Reply</option><option>Customer Was Satisfied</option><option>Customer Complained</option><option>Escalated to Director</option></select></div><div><label>Handled By</label><input name="handledBy" readonly value="'+esc(currentOfficerName)+'"></div><div class="full"><label>Editable Message Template</label><textarea name="messageText" id="followupMessageText"></textarea></div><div class="full"><label>Follow-Up Notes</label><textarea name="notes"></textarea></div></div><div class="row"><button type="button" class="green" onclick="openPreparedFollowupWhatsApp()">Open WhatsApp</button><button class="primary" type="submit">Submit Follow-Up Report</button></div></form></div><div class="panel"><h2>Follow-Up Records</h2>'+renderFollowupsTable()+'</div></section>',()=>{document.getElementById('followupCustomerSelect').onchange=e=>{const c=db.customers.find(x=>x.id===e.target.value);if(c){const f=document.getElementById('followupForm');f.customer.value=c.name;f.phone.value=c.phone;applyFollowupTemplate()}};document.getElementById('followupPurpose').onchange=applyFollowupTemplate;applyFollowupTemplate();document.getElementById('followupForm').onsubmit=saveFollowup})}
function applyFollowupTemplate(){const f=document.getElementById('followupForm'),p=document.getElementById('followupPurpose'),m=document.getElementById('followupMessageText');if(!f||!p||!m)return;m.value=(followupTemplates()[p.value]||'').replaceAll('[Customer Name]',f.customer.value||'Customer')}
function openPreparedFollowupWhatsApp(){const f=document.getElementById('followupForm'),phone=f.phone.value,msg=document.getElementById('followupMessageText').value;if(!phone)return alert('Enter customer phone number first.');window.open('https://wa.me/'+wnum(phone)+'?text='+encodeURIComponent(msg),'_blank')}
function saveFollowup(e){e.preventDefault();const data=formData(e.target);db.followups.unshift({id:nextId('followup'),createdByName:currentOfficerName,...data});save()}
function renderFollowupsTable(){return table(db.followups,['Date','ID','Customer','Phone','Channel','Purpose','Outcome','Message','Action'],f=>[niceDate(f.date),f.id,esc(f.customer),esc(f.phone),esc(f.channel||'-'),esc(f.purpose||'-'),statusTag(f.outcome),esc(f.messageText||f.notes||'-'),'<button class="small green" onclick="openFollowupWhatsApp(\''+f.id+'\')">WhatsApp</button>'],'No follow-up records yet.')}
function openFollowupWhatsApp(fid){const f=db.followups.find(x=>x.id===fid);if(f)window.open('https://wa.me/'+wnum(f.phone)+'?text='+encodeURIComponent(f.messageText||f.notes||''),'_blank')}
function renderCustomersPage(){db.customers.forEach(refreshCustomer);installPage('<section><div class="panel"><div class="eyebrow">Customer Profiles</div><h2>Customer Auto-Fill / History</h2>'+table(db.customers,['Customer','Phone','Email','Locations','Site Contacts','Quotes','Invoices','Outstanding','Last Order','Action'],c=>[esc(c.name),esc(c.phone),esc(c.email||'-'),(c.locations||[]).map(esc).join('<br>')||'-',(c.siteContacts||[]).map(esc).join('<br>')||'-',String((c.quoteIds||[]).length),String((c.invoiceIds||[]).length),money(c.outstandingBalance),niceDate(c.lastOrderDate),currentRole==='director'?'<button class="small red" onclick="deleteRecord(\'customers\',\''+c.id+'\')">Delete</button>':'-'],'No customer profiles yet.')+'</div></section>')}
function renderStaffPage(){installPage('<section><div class="panel director-only"><div class="eyebrow">Director Access Control</div><h2>Officer Profiles / Tokens</h2><form id="officerForm"><div class="grid"><div><label>Officer Role</label><select name="role" required><option value="support">Business Support Officer</option><option value="procurement">Procurement Officer</option><option value="logistics">Logistics / Inspection Officer</option><option value="social">Client Follow-Up Officer</option><option value="director">Director</option></select></div><div><label>Officer Name</label><input name="name" required></div><div><label>Access Token</label><input name="token" id="officerToken" required></div><div><label>Status</label><select name="status"><option>Active</option><option>Inactive</option></select></div></div><div class="row"><button type="button" class="secondary" onclick="generateOfficerToken()">Generate Token</button><button class="primary" type="submit">Save Officer Profile</button></div></form></div><div class="panel director-only"><h2>Registered Officers</h2>'+table(db.officers,['Role','Officer Name','Token','Status','Actions'],o=>[esc(roleNames[o.role]||o.role),esc(o.name),esc(o.token),statusTag(o.status),'<button class="small secondary" onclick="resetOfficerToken(\''+o.id+'\')">New Token</button> <button class="small red" onclick="deactivateOfficer(\''+o.id+'\')">Deactivate</button> <button class="small red" onclick="deleteRecord(\'officers\',\''+o.id+'\')">Wipe</button>'],'No registered officers yet. Default demo PINs are still active.')+'</div></section>',()=>{document.getElementById('officerForm').onsubmit=saveOfficer})}
function generateOfficerToken(){document.getElementById('officerToken').value=Math.random().toString(36).slice(2,8).toUpperCase()}
function saveOfficer(e){e.preventDefault();if(currentRole!=='director')return alert('Only Director can manage officer profiles.');const data=formData(e.target);const old=db.officers.find(o=>o.role===data.role&&o.name.toLowerCase()===data.name.toLowerCase());if(old)Object.assign(old,data);else db.officers.unshift({id:nextId('officer'),...data});save();alert('Officer profile saved.')}
function resetOfficerToken(oid){const o=db.officers.find(x=>x.id===oid);if(o){o.token=Math.random().toString(36).slice(2,8).toUpperCase();o.status='Active';save();alert('New token: '+o.token)}}
function deactivateOfficer(oid){const o=db.officers.find(x=>x.id===oid);if(o){o.status='Inactive';save()}}
function dayStats(date){const invoices=db.invoices.filter(i=>i.date===date&&i.status!=='Awaiting Director Approval'&&i.status!=='Rejected');const payments=db.payments.filter(p=>p.date===date&&p.status==='Approved');return{date,quotes:db.quotes.filter(x=>x.date===date).length,invoices:invoices.length,sales:invoices.reduce((a,b)=>a+Number(b.total||0),0),paid:payments.reduce((a,b)=>a+Number(b.totalPaid||0),0),balance:invoices.reduce((a,b)=>a+Number(b.balance||0),0),procurement:db.procurementRequests.filter(x=>x.date===date).length,waybills:db.waybills.filter(x=>x.date===date).length,followups:db.followups.filter(x=>x.date===date).length}}
function dateRange(start,end){const out=[];let d=new Date(start),e=new Date(end);while(d<=e){out.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+1)}return out}
function dailyReportHtml(date){const s=dayStats(date);return '<div class="panel"><div class="document-logo-wrap"><img src="'+LOGO_PATH+'" class="document-logo"></div><h2>FTH D-UNIQ Daily Operations Report</h2><p><b>Date:</b> '+niceDate(date)+'</p>'+table([s],['Quotes','Invoices','Sales','Paid','Balance','Procurement','Waybills','Follow-ups'],x=>[x.quotes,x.invoices,money(x.sales),money(x.paid),money(x.balance),x.procurement,x.waybills,x.followups])+'</div>'}
function weeklyReportHtml(start,end){return '<div class="panel"><div class="document-logo-wrap"><img src="'+LOGO_PATH+'" class="document-logo"></div><h2>FTH D-UNIQ Weekly Statement Report</h2><p><b>Period:</b> '+niceDate(start)+' to '+niceDate(end)+'</p>'+table(dateRange(start,end).map(dayStats),['Day','Quotes','Invoices','Sales','Paid','Balance','Procurement','Waybills','Follow-ups'],s=>[niceDate(s.date),s.quotes,s.invoices,money(s.sales),money(s.paid),money(s.balance),s.procurement,s.waybills,s.followups])+'</div>'}
function monthlyReportHtml(month){const first=month+'-01',d=new Date(first),days=[];while(d.toISOString().slice(0,7)===month){days.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+1)}return '<div class="panel"><div class="document-logo-wrap"><img src="'+LOGO_PATH+'" class="document-logo"></div><h2>FTH D-UNIQ Monthly Reconciliation</h2><p><b>Month:</b> '+esc(month)+'</p>'+table(days.map(dayStats),['Day','Quotes','Invoices','Sales','Paid','Balance','Procurement','Waybills','Follow-ups'],s=>[niceDate(s.date),s.quotes,s.invoices,money(s.sales),money(s.paid),money(s.balance),s.procurement,s.waybills,s.followups])+'</div>'}
function renderReportsPage(){installPage('<section><div class="panel"><div class="eyebrow">Reports</div><h2>Daily, Weekly & Monthly Reports</h2><div class="grid4"><div><label>Daily Report Date</label><input id="reportDate" type="date"></div><div><label>Weekly Start Date</label><input id="weekStartDate" type="date"></div><div><label>Weekly End Date</label><input id="weekEndDate" type="date"></div><div><label>Monthly Report</label><input id="reportMonth" type="month"></div></div><div class="row"><button class="primary" type="button" onclick="renderDailyReport()">Generate Daily Report</button><button class="blue director-only-inline" type="button" onclick="renderWeeklyReport()">Generate Weekly Statement</button><button class="blue director-only-inline" type="button" onclick="renderMonthlyReport()">Generate Monthly Reconciliation</button><button class="secondary director-only-inline" type="button" onclick="printCurrentReport()">Director Print / Save PDF</button><button class="dark director-only-inline" type="button" onclick="archiveCurrentReport()">Director Archive Current Report</button><button class="green support-only-inline" type="button" onclick="submitDailyReportToDirector()">Submit Daily Report to Director</button><button class="red" type="button" onclick="authorizedClearWorkstationData()">Clear Workstation Data</button></div><div class="notice">The clear button is available in every officer portal under Reports, but it requires the Director clear passcode before anything is deleted. Header refresh/clear-device buttons have been removed.</div></div><div id="reportBox"></div></section>');setDefaultDates();renderDailyReport()}
let currentReportHtml='',currentReportTitle='';
function renderDailyReport(){const d=document.getElementById('reportDate')?.value||today();currentReportHtml=dailyReportHtml(d);currentReportTitle='Daily Report '+d;document.getElementById('reportBox').innerHTML=currentReportHtml}
function renderWeeklyReport(){if(currentRole!=='director')return alert('Only Director can generate weekly report.');const s=document.getElementById('weekStartDate').value||today(),e=document.getElementById('weekEndDate').value||today();currentReportHtml=weeklyReportHtml(s,e);currentReportTitle='Weekly Report '+s+' to '+e;document.getElementById('reportBox').innerHTML=currentReportHtml}
function renderMonthlyReport(){if(currentRole!=='director')return alert('Only Director can generate monthly report.');const m=document.getElementById('reportMonth').value||monthNow();currentReportHtml=monthlyReportHtml(m);currentReportTitle='Monthly Report '+m;document.getElementById('reportBox').innerHTML=currentReportHtml}
function printCurrentReport(){if(currentRole!=='director')return alert('Only Director can print reports.');if(!currentReportHtml)renderDailyReport();printWin(currentReportHtml,currentReportTitle)}
function archiveCurrentReport(){if(currentRole!=='director')return alert('Only Director can archive reports.');if(!currentReportHtml)renderDailyReport();db.archives.unshift({id:nextId('archive'),date:today(),type:currentReportTitle,title:currentReportTitle,html:currentReportHtml});save();alert('Report archived.')}
function submitDailyReportToDirector(){if(currentRole!=='support')return alert('Only Business Support can submit daily report.');db.dailySubmissions.unshift({id:nextId('report'),date:document.getElementById('reportDate')?.value||today(),submittedBy:currentOfficerName,status:'Submitted to Director Dashboard'});save();alert('Daily report submitted.')}
function renderArchivePage(){installPage('<section><div class="panel"><div class="eyebrow">Director Archive</div><h2>Archived Reports</h2>'+table(db.archives,['Date','Archive ID','Type','Title','Action'],a=>[niceDate(a.date),a.id,esc(a.type),esc(a.title),'<button class="small secondary" onclick="printArchive(\''+a.id+'\')">Print</button>'],'No archived report yet.')+'</div></section>')}
function printArchive(aid){const a=db.archives.find(x=>x.id===aid);if(a)printWin(a.html,a.title)}
function docHeader(title,ref){return '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:18px;border-bottom:4px solid #d4a62a;padding-bottom:14px;margin-bottom:20px"><div style="display:flex;align-items:center;gap:16px"><img src="'+LOGO_PATH+'" style="width:82px;height:82px;object-fit:contain"><div><h1 style="margin:0;font-family:Cormorant Garamond,serif;font-size:38px">FTH D-UNIQ</h1><b>'+title+'</b><br><span>'+ref+'</span><br><span>'+COMPANY_BN+'</span></div></div><div style="font-size:12px;line-height:1.65;text-align:right;max-width:280px"><b>WhatsApp:</b> '+COMPANY_WHATSAPP+'<br><b>Email:</b> '+COMPANY_EMAIL+'<br><b>Website:</b> '+COMPANY_WEBSITE+'<br><b>Address:</b> '+COMPANY_ADDRESS+'<br><b>Site:</b> '+COMPANY_SITE_LOCATION+'</div></div>'}
function accountBlock(){return '<div class="table"><table><tr><th>Bank Name</th><td>'+COMPANY_BANK_NAME+'</td></tr><tr><th>Account Name</th><td>'+COMPANY_ACCOUNT_NAME+'</td></tr><tr><th>Account Number</th><td>'+COMPANY_ACCOUNT_NUMBER+'</td></tr></table></div>'}
function invoiceHtml(iid){const i=db.invoices.find(x=>x.id===iid);if(!i)return'';return '<div class="panel">'+docHeader('CUSTOMER INVOICE',i.id)+'<p><b>Customer:</b> '+esc(i.customer)+'<br><b>Phone:</b> '+esc(i.phone)+'<br><b>Location:</b> '+esc(i.location)+'<br><b>Delivery:</b> '+niceDate(i.deliveryDate)+' '+esc(i.deliveryTime||'')+'</p>'+table(i.lines,['Description','Qty','Unit','Rate','Amount'],l=>[esc(l.desc),num(l.qty),esc(l.unit),money(l.rate),money(l.amount)])+'<div class="table"><table><tr><td>Subtotal</td><td>'+money(i.subtotal)+'</td></tr><tr><td>Logistics / Delivery Fee</td><td>'+money(i.logisticsFee)+'</td></tr><tr><td>Discount</td><td>'+money(i.discount)+'</td></tr><tr><th>Grand Total</th><th>'+money(i.total)+'</th></tr><tr><td>Paid</td><td>'+money(i.paid)+'</td></tr><tr><th>Balance</th><th>'+money(i.balance)+'</th></tr></table></div><h3>Payment Details</h3>'+accountBlock()+'<div class="notice"><b>Terms / Refund Notice:</b><br>'+esc(REFUND_NOTICE)+'</div></div>'}
function receiptHtml(rid){const r=db.receipts.find(x=>x.id===rid);if(!r)return'';return '<div class="panel">'+docHeader(r.receiptType.toUpperCase(),r.id)+'<p><b>Customer:</b> '+esc(r.customer)+'<br><b>Invoice:</b> '+esc(r.invoiceId)+'</p><div class="table"><table><tr><th>Total Paid</th><th>'+money(r.amount)+'</th></tr><tr><th>Balance</th><th>'+money(r.balance)+'</th></tr></table></div></div>'}
function waybillHtml(wid){const w=db.waybills.find(x=>x.id===wid);if(!w)return'';return '<div class="panel">'+docHeader('DELIVERY WAYBILL',w.id)+'<div class="table"><table><tr><th>Invoice</th><td>'+esc(w.invoiceId)+'</td></tr><tr><th>Customer</th><td>'+esc(w.customer)+'</td></tr><tr><th>Phone</th><td>'+esc(w.phone)+'</td></tr><tr><th>Delivery Location</th><td>'+esc(w.location)+'</td></tr><tr><th>Products / Materials</th><td>'+esc(w.products).split('\n').join('<br>')+'</td></tr><tr><th>Status</th><td>'+esc(w.status)+'</td></tr></table></div></div>'}
function approvalDetails(type,idv){if(type==='invoice')return invoiceHtml(idv);if(type==='waybill')return waybillHtml(idv);if(type==='payment'){const p=db.payments.find(x=>x.id===idv);return p?'<div class="panel">'+docHeader('PAYMENT APPROVAL REVIEW',p.id)+table([p],['Invoice','Customer','Transfer','Cash','POS','Total'],x=>[x.invoiceId,esc(x.customer),money(x.transferAmount),money(x.cashAmount),money(x.posAmount),money(x.totalPaid)])+'</div>':''}if(type==='procRequest'){const r=db.procurementRequests.find(x=>x.id===idv);return r?'<div class="panel">'+docHeader('PROCUREMENT SOURCING REQUEST',r.id)+table([r],['Quote','Customer','Product','Quantity','Location','Request Note'],x=>[x.quoteId,esc(x.customer),esc(x.itemName),esc(x.qty)+' '+esc(x.unit),esc(x.location),esc(x.requestNote||'-')])+'</div>':''}if(type==='procurement'){const p=db.procurement.find(x=>x.id===idv);return p?'<div class="panel">'+docHeader('PROCUREMENT FEEDBACK REVIEW',p.id)+table([p],['Vendor','Product','Cost','Suggested Selling','Feedback'],x=>[esc(x.vendor||'-'),esc(x.itemName||x.item||'-'),money(x.costPrice||0),money(x.sellingPrice||0),esc(x.feedbackToSupport||'-')])+'</div>':''}return''}
function viewApproval(type,idv){let modal=document.getElementById('approvalReviewModal');if(!modal){modal=document.createElement('div');modal.id='approvalReviewModal';modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:none;padding:20px;overflow:auto';document.body.appendChild(modal)}const approve={invoice:'approveInvoice',payment:'approvePayment',waybill:'approveWaybill',procRequest:'approveProcRequest',procurement:'approveProcurement'},reject={invoice:'rejectInvoice',payment:'rejectPayment',procRequest:'rejectProcRequest',procurement:'rejectProcurement'};modal.innerHTML='<div style="background:#fff;max-width:1050px;margin:20px auto;padding:22px;border-radius:18px"><div style="display:flex;justify-content:space-between;gap:14px"><h2>Open / View Approval Details</h2><button class="small red" onclick="document.getElementById(\'approvalReviewModal\').style.display=\'none\'">Close</button></div>'+approvalDetails(type,idv)+'<div class="row"><button class="small green" onclick="'+approve[type]+'(\''+idv+'\');document.getElementById(\'approvalReviewModal\').style.display=\'none\'">I have reviewed — Approve / Proceed</button>'+(reject[type]?'<button class="small red" onclick="'+reject[type]+'(\''+idv+'\');document.getElementById(\'approvalReviewModal\').style.display=\'none\'">Reject / Return</button>':'')+'</div></div>';modal.style.display='block'}
function printInvoice(iid){const i=db.invoices.find(x=>x.id===iid);if(!i||i.status==='Awaiting Director Approval'||i.status==='Rejected')return alert('Invoice must be approved before printing.');printWin(invoiceHtml(iid),'Invoice '+iid)}
function printReceipt(rid){printWin(receiptHtml(rid),'Receipt '+rid)}
function printWaybill(wid){const w=db.waybills.find(x=>x.id===wid);if(!w||w.status==='Awaiting Director Approval')return alert('Waybill must be approved before printing.');printWin(waybillHtml(wid),'Waybill '+wid)}
function printWin(content,title){const w=window.open('','_blank');w.document.write('<html><head><title>'+esc(title)+'</title><style>@page{size:A4;margin:14mm}body{font-family:Arial,sans-serif;color:#1b1714}.panel{max-width:900px;margin:auto}table{width:100%;border-collapse:collapse;font-size:11px}th,td{border:1px solid #999;padding:7px;text-align:left;vertical-align:top}th{background:#eee}.notice{border:1px solid #d4a62a;padding:10px;border-radius:8px;margin-top:10px;font-size:11px;line-height:1.5}@media print{button{display:none!important}}</style></head><body>'+content+'<script>window.onload=function(){setTimeout(function(){window.print()},400)}<\/script></body></html>');w.document.close()}
function openWhatsAppInvoice(iid){const i=db.invoices.find(x=>x.id===iid);if(!i)return;const msg='Good day '+(i.customer||'Customer')+', kindly find attached your invoice from FTH D-UNIQ.\n\nInvoice No: '+i.id+'\nTotal Amount: '+money(i.total)+'\nAmount Paid: '+money(i.paid)+'\nBalance: '+money(i.balance)+'\n\nPlease review and send proof of payment after payment. Thank you.';window.open('https://wa.me/'+wnum(i.phone)+'?text='+encodeURIComponent(msg),'_blank')}
function openWhatsAppReceipt(rid){const r=db.receipts.find(x=>x.id===rid);if(!r)return;const msg='Good day '+(r.customer||'Customer')+', kindly find attached your payment receipt / part-payment acknowledgement from FTH D-UNIQ.\n\nReceipt No: '+r.id+'\nInvoice No: '+r.invoiceId+'\nAmount Paid: '+money(r.amount)+'\nBalance: '+money(r.balance)+'\n\nThank you.';window.open('https://wa.me/'+wnum(r.phone)+'?text='+encodeURIComponent(msg),'_blank')}
async function deleteRecord(collection,idv){if(!db[collection])return;if(currentRole!=='director'&&!['quotes','stock','followups'].includes(collection))return alert('Only Director can delete approved or sensitive records.');if(!confirm('Delete/correct this record?'))return;const item=db[collection].find(x=>x.id===idv);if(item&&item._cloudId){try{await fetch(API_RECORDS+'/'+encodeURIComponent(item._cloudId),{method:'DELETE'})}catch(e){}}db[collection]=db[collection].filter(x=>x.id!==idv);localSave();renderCurrentPage()}
document.addEventListener('contextmenu',e=>{if(!e.target.closest('input,textarea,select,button,a,summary,canvas'))e.preventDefault()});document.addEventListener('copy',e=>{if(!e.target.closest('input,textarea'))e.preventDefault()});
const oldLogin=sessionStorage.getItem('fth_login');if(oldLogin){try{const l=JSON.parse(oldLogin);if(l.role){currentRole=l.role;currentOfficerName=l.officerName||roleNames[l.role];currentOfficerId=l.officerId||'';currentLoginTime=l.loginTime||new Date().toLocaleString('en-NG');startApp()}}catch(e){}}
</script>
</body>
