<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FTH D-UNIQ | Operations Workstation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--ink:#1b1714;--muted:#71685d;--gold:#d4a62a;--gold2:#9b731a;--bg:#f6efe3;--card:#fffdf8;--line:rgba(155,115,26,.24);--shadow:0 18px 45px rgba(52,35,8,.08);--green:#166534;--red:#991b1b;--blue:#1e3a8a;--amber:#92400e}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;color:var(--ink);background:linear-gradient(180deg,#fbf7ef,var(--bg));min-height:100vh}.wrap{max-width:1500px;margin:auto;padding:16px}.login{min-height:100vh;display:grid;place-items:center;padding:18px}.card,.panel{background:rgba(255,253,248,.94);border:1px solid var(--line);border-radius:26px;padding:24px;box-shadow:var(--shadow);margin-bottom:16px}.login .card{max-width:680px;width:100%}.top{display:flex;align-items:center;justify-content:space-between;gap:14px;background:rgba(255,253,248,.95);border:1px solid var(--line);border-radius:26px;padding:18px 20px;box-shadow:var(--shadow);position:sticky;top:10px;z-index:10}.brand{display:flex;align-items:center;gap:14px}.brand-logo{width:58px;height:58px;border-radius:999px;object-fit:contain;background:#fff;border:1px solid var(--line);padding:5px}.brand h1{margin:0;font-family:Cormorant Garamond,serif;font-size:clamp(1.8rem,4vw,3rem);line-height:1}.brand p{margin:4px 0 0;color:var(--muted);font-weight:800;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase}.eyebrow{display:inline-flex;gap:10px;align-items:center;color:var(--gold2);font-size:.78rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;margin-bottom:10px}.eyebrow:before{content:"";width:36px;height:2px;background:var(--gold);border-radius:999px}h2,h3{margin-top:0}h2{font-family:Cormorant Garamond,serif;font-size:clamp(1.8rem,3vw,3rem);line-height:1;margin-bottom:10px}h3{font-family:Cormorant Garamond,serif;font-size:1.35rem;margin-bottom:12px}p{color:var(--muted);line-height:1.7}.small-copy{font-size:.86rem;color:var(--muted);line-height:1.6}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.full{grid-column:1/-1}label{display:block;font-size:.86rem;font-weight:900;margin-bottom:7px}input,select,textarea{width:100%;border:1px solid rgba(155,115,26,.25);border-radius:16px;padding:13px;font:inherit;background:#fff;color:var(--ink)}textarea{min-height:105px;resize:vertical}button,.btn{border:0;border-radius:999px;padding:12px 17px;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px}.primary{background:linear-gradient(135deg,#e0b744,#b78119);color:#fff}.secondary{background:#fff;border:1px solid var(--line);color:var(--ink)}.dark{background:var(--ink);color:#fff}.green{background:var(--green);color:#fff}.red{background:var(--red);color:#fff}.blue{background:var(--blue);color:#fff}.small{font-size:.78rem;padding:8px 11px}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:14px}.chip{display:inline-flex;border:1px solid var(--line);border-radius:999px;background:#fff;padding:9px 12px;font-weight:900;color:var(--gold2)}.app{display:none}.layout{display:grid;grid-template-columns:285px 1fr;gap:16px;margin-top:16px}.side{position:sticky;top:110px;align-self:start;background:rgba(255,253,248,.95);border:1px solid var(--line);border-radius:22px;padding:12px;box-shadow:var(--shadow);max-height:calc(100vh - 130px);overflow:auto}.nav{width:100%;background:transparent;color:var(--muted);text-align:left;margin-bottom:6px;border-radius:15px}.nav.active{background:#fff5df;color:var(--ink);border:1px solid var(--line)}.mobile{display:none;margin-top:14px}.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.metric{background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px}.metric span{display:block;color:var(--muted);font-size:.75rem;font-weight:900;text-transform:uppercase;letter-spacing:.08em}.metric strong{display:block;margin-top:7px;font-size:1.35rem}.table{overflow:auto;background:#fff;border:1px solid var(--line);border-radius:18px}table{width:100%;border-collapse:collapse;min-width:960px}th,td{padding:11px;border-bottom:1px solid rgba(155,115,26,.15);text-align:left;vertical-align:top;font-size:.86rem}th{background:#eee5d8;font-weight:900}.tag{display:inline-flex;border-radius:999px;padding:5px 8px;font-size:.72rem;font-weight:900;background:#fff4d8;color:var(--gold2);border:1px solid var(--line)}.tag.ok{background:rgba(22,101,52,.1);color:var(--green)}.tag.bad{background:rgba(153,27,27,.1);color:var(--red)}.tag.info{background:rgba(30,58,138,.1);color:var(--blue)}.tag.warn{background:rgba(146,64,14,.12);color:var(--amber)}.notice{border-left:4px solid var(--gold);background:rgba(212,166,42,.09);border-radius:16px;padding:13px 15px;color:var(--muted);line-height:1.65;margin:12px 0}.empty{padding:20px;text-align:center;color:var(--muted)}.document-logo-wrap{display:flex;justify-content:center;margin:10px 0 18px}.document-logo{width:120px;height:auto;max-width:35%;object-fit:contain}.pill-list{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.pill{border:1px solid var(--line);border-radius:999px;padding:6px 9px;background:#fff;font-size:.78rem;font-weight:800;color:var(--gold2)}
@media(max-width:1050px){.layout{grid-template-columns:1fr}.side{display:none}.mobile{display:block}.metrics{grid-template-columns:repeat(2,1fr)}}
@media(max-width:760px){.wrap{padding:10px}.top{position:relative;top:auto;flex-direction:column;align-items:flex-start}.grid,.grid3,.grid4,.metrics{grid-template-columns:1fr}.card,.panel{padding:18px}button,.btn{width:100%}.small{width:auto}.brand-logo{width:50px;height:50px}table{min-width:760px}}
</style>
</head>
<body>
<section id="login" class="login">
  <div class="card">
    <div class="document-logo-wrap"><img src="assets/fth-duniq-logo.PNG" class="document-logo" alt="FTH D-UNIQ Logo"></div>
    <div class="eyebrow">Private Login</div>
    <h2>FTH D-UNIQ Operations Workstation</h2>
    <p>Authorized officers should log in with their assigned role, officer name, and access token.</p>
    <form id="loginForm">
      <div class="grid">
        <div><label>Role</label><select id="role" required><option value="">Select role</option><option value="director">Director</option><option value="support">Business Support Officer</option><option value="procurement">Procurement Officer</option><option value="logistics">Logistics / Inspection Officer</option><option value="social">Client Follow-Up Officer</option></select></div>
        <div><label>Officer Name on Duty</label><input id="officerDutyName" type="text" required placeholder="Enter officer name"></div>
        <div><label>Access Token</label><input id="pin" type="password" required></div>
      </div>
      <div class="row"><button class="primary" type="submit">Enter Workstation</button></div>
      <p id="loginMsg"></p>
    </form>
  </div>
</section>
<div id="app" class="app wrap">
  <header class="top">
    <div class="brand"><img src="assets/fth-duniq-logo.PNG" class="brand-logo" alt="FTH D-UNIQ Logo"><div><h1>FTH D-UNIQ</h1><p>Operations Workstation</p></div></div>
    <div class="row"><span class="chip" id="roleName"></span><span class="chip" id="officerChip"></span><span class="chip" id="dateNow"></span><button class="secondary" onclick="refreshThisDeviceFromCloud()">Refresh Records</button><button class="red" onclick="deviceReset()">Clear This Device</button><button class="dark" onclick="logout()">Logout</button></div>
  </header>
  <select id="mobileNav" class="mobile" onchange="showPage(this.value)"></select>
  <div class="layout"><aside class="side" id="side"></aside><main id="main"></main></div>
</div>
<script>
const KEY='fth_duniq_workstation_safe_v2';
const API_RECORDS='/api/workstation/records';
const LOGO_PATH='assets/fth-duniq-logo.PNG';
const COMPANY_WHATSAPP='08061396612';
const COMPANY_EMAIL='info@fthduniq.com';
const COMPANY_ADDRESS='Plot 627A, 1st Avenue, Festac Town Lagos, Nigeria';
const defaultPins={director:'0000',support:'1111',procurement:'2222',logistics:'3333',social:'4444'};
const roleNames={director:'Director',support:'Business Support Officer',procurement:'Procurement Officer',logistics:'Logistics / Inspection Officer',social:'Client Follow-Up Officer'};
const allTabs=[['dashboard','Dashboard'],['quotes','Quotes / Requests'],['invoices','Invoices / Sales'],['payments','Payments / Receipts'],['waybills','Waybills'],['inventory','Inventory'],['procurement','Procurement Desk'],['logistics','Logistics / Inspection'],['followup','Client Follow-Up'],['customers','Customer Profiles'],['staffAccess','Officer Access Control'],['reports','Reports'],['archive','Archive']];
const roleTabs={director:['dashboard','quotes','invoices','payments','waybills','inventory','procurement','logistics','followup','customers','staffAccess','reports','archive'],support:['dashboard','quotes','invoices','payments','waybills','inventory','customers','reports'],procurement:['dashboard','procurement','inventory','customers','reports'],logistics:['dashboard','logistics','waybills','customers','reports'],social:['dashboard','followup','customers','reports']};
const productOptions=['Cement','4 Inches Block','6 Inches Block','9 Inches Block','Sharp Sand','Plaster Sand','Granite','Interlocking Stones','Kerbs','Procurement Support','Logistics Coordination','Project Support','Procurement Records & Expense Tracking','Other / To Be Confirmed'];
const TYPE_COLLECTION={quote:'quotes',invoice:'invoices',payment:'payments',receipt:'receipts',waybill:'waybills',stock:'stock',procurement:'procurement',logistics:'logistics',followup:'followups',customer:'customers',officer:'officers',archive:'archives',report:'dailySubmissions'};
const COLLECTION_TYPE=Object.fromEntries(Object.entries(TYPE_COLLECTION).map(([a,b])=>[b,a]));
let currentRole='',currentOfficerName='',currentOfficerId='',currentLoginTime='',syncTimer=null;
let db=load();
function blank(){return{quotes:[],invoices:[],payments:[],receipts:[],waybills:[],stock:[],procurement:[],logistics:[],followups:[],customers:[],officers:[],archives:[],dailySubmissions:[],counts:{quote:0,invoice:0,payment:0,receipt:0,waybill:0,stock:0,procurement:0,logistics:0,followup:0,customer:0,officer:0,archive:0,report:0}}}
function load(){try{const x=JSON.parse(localStorage.getItem(KEY))||blank();const b=blank();return Object.assign({},b,x,{counts:Object.assign({},b.counts,x.counts||{})})}catch(e){return blank()}}
function localSave(){localStorage.setItem(KEY,JSON.stringify(db))}
function save(){localSave();queueSync();renderCurrentPage()}
function nextId(type){db.counts[type]=(db.counts[type]||0)+1;return 'FTH-'+type.toUpperCase()+'-'+new Date().getFullYear()+'-'+String(db.counts[type]).padStart(4,'0')}
function today(){return new Date().toISOString().slice(0,10)}
function money(n){return '₦'+Number(n||0).toLocaleString('en-NG',{maximumFractionDigits:2})}
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}
function niceDate(d){if(!d)return'';try{return new Date(d).toLocaleDateString('en-NG',{year:'numeric',month:'short',day:'2-digit'})}catch(e){return d}}
function formData(form){return Object.fromEntries(new FormData(form).entries())}
function digits(v){return String(v||'').split('').filter(ch=>'0123456789'.includes(ch)).join('')}
function cleanPhone(v){let d=digits(v);if(d.startsWith('234')&&d.length>=13)d='0'+d.slice(3);return d}
function table(rows,heads,map,empty='No records yet.'){if(!rows||!rows.length)return '<div class="empty">'+empty+'</div>';return '<div class="table"><table><thead><tr>'+heads.map(h=>'<th>'+h+'</th>').join('')+'</tr></thead><tbody>'+rows.map((r,i)=>'<tr>'+map(r,i).map(c=>'<td>'+c+'</td>').join('')+'</tr>').join('')+'</tbody></table></div>'}
function statusTag(s){const str=String(s||'');let c=str.includes('Approved')||str==='Paid'||str==='Closed'||str==='Active'||str.includes('Satisfied')?'ok':str.includes('Reject')||str.includes('Complaint')||str==='Inactive'?'bad':str.includes('Awaiting')||str.includes('Pending')?'warn':'info';return '<span class="tag '+c+'">'+esc(str)+'</span>'}
function verifyLogin(role,token){const exact=db.officers.find(o=>o.role===role&&String(o.token).trim()===String(token).trim()&&o.status==='Active');if(exact)return exact;if(defaultPins[role]===String(token).trim())return{id:'default-'+role,role:role,name:roleNames[role],token:token,status:'Active'};return null}
function customerByPhone(p){return db.customers.find(c=>c.cleanPhone===cleanPhone(p))}
function upsertCustomer(o){const cp=cleanPhone(o.phone);if(!cp)return;let c=customerByPhone(o.phone);if(!c){c={id:nextId('customer'),name:o.customer||o.name||'',phone:o.phone||'',cleanPhone:cp,email:o.email||'',locations:[],quoteIds:[],invoiceIds:[],lastOrderDate:o.date||today(),outstandingBalance:0};db.customers.unshift(c)}c.name=o.customer||o.name||c.name;c.phone=o.phone||c.phone;c.email=o.email||c.email;if(o.location&&!c.locations.includes(o.location))c.locations.unshift(o.location);c.lastOrderDate=o.date||today();refreshCustomer(c)}
function refreshCustomer(c){c.invoiceIds=db.invoices.filter(i=>cleanPhone(i.phone)===c.cleanPhone).map(i=>i.id);c.quoteIds=db.quotes.filter(q=>cleanPhone(q.phone)===c.cleanPhone).map(q=>q.id);c.outstandingBalance=db.invoices.filter(i=>cleanPhone(i.phone)===c.cleanPhone&&i.status!=='Rejected').reduce((a,b)=>a+Number(b.balance||0),0)}
function productOptionsHtml(selected=''){return '<option value="">Select</option>'+productOptions.map(x=>'<option '+(x===selected?'selected':'')+'>'+x+'</option>').join('')}
function queueSync(){clearTimeout(syncTimer);syncTimer=setTimeout(syncAllToApi,700)}
function inferRowType(row,data){return row.type || (data && (data._cloudType || data.type)) || ''}
async function loadFromApi(){let savedBefore={};try{savedBefore=JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){savedBefore={}}try{const res=await fetch(API_RECORDS+'?t='+Date.now(),{cache:'no-store'});if(!res.ok)return;const payload=await res.json();const arr=Array.isArray(payload)?payload:(payload.records||payload.data||[]);const fresh=blank();arr.forEach(row=>{let data=row.data||row.record||row;try{if(typeof data==='string')data=JSON.parse(data)}catch(e){}try{if(row.data_json)data=JSON.parse(row.data_json)}catch(e){}const type=inferRowType(row,data);if(!type||!TYPE_COLLECTION[type])return;data._cloudId=row.id||data._cloudId||data.id;data._cloudType=type;data._cloudSynced=true;fresh[TYPE_COLLECTION[type]].push(data)});if((!fresh.officers||!fresh.officers.length)&&savedBefore.officers&&Array.isArray(savedBefore.officers))fresh.officers=savedBefore.officers;db=fresh;localStorage.setItem(KEY,JSON.stringify(db))}catch(e){console.warn('Unable to load shared records:',e)}}
async function apiSave(type,data){try{const payload={type:type,status:data.status||data.directorApprovalStatus||'Saved',customer_name:data.customer||data.name||'',customer_phone:data.phone||'',created_by_role:data.createdByRole||currentRole,created_by_name:data.createdByName||currentOfficerName,data:data};const isUpdate=!!data._cloudId;const res=await fetch(isUpdate?API_RECORDS+'/'+encodeURIComponent(data._cloudId):API_RECORDS,{method:isUpdate?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const out=await res.json().catch(()=>({}));if(res.ok){data._cloudId=out.id||out.business_ref||data._cloudId||data.id;data._cloudType=type;data._cloudSynced=true;localSave()}}catch(e){}}
async function syncAllToApi(){for(const [collection,type] of Object.entries(COLLECTION_TYPE)){for(const item of db[collection]||[]){await apiSave(type,item)}}}
async function deleteCloudRecord(item){if(item&&item._cloudId){try{await fetch(API_RECORDS+'/'+encodeURIComponent(item._cloudId),{method:'DELETE'})}catch(e){}}}
async function clearOperationalData(){if(currentRole!=='director')return alert('Only Director can clear shared operational data.');const confirmText=prompt('This will clear operational records but keep officer access tokens. Type CLEAR to continue.');if(confirmText!=='CLEAR')return alert('Clear action cancelled.');let officers=db.officers.slice();try{for(let round=0;round<3;round++){const res=await fetch(API_RECORDS+'?t='+Date.now(),{cache:'no-store'});const payload=await res.json();const records=Array.isArray(payload)?payload:(payload.records||payload.data||[]);if(!records.length)break;for(const record of records){let data=record.data||record.record||record;try{if(typeof data==='string')data=JSON.parse(data)}catch(e){}try{if(record.data_json)data=JSON.parse(record.data_json)}catch(e){}const recordType=inferRowType(record,data);if(recordType==='officer')continue;if(record.id!==undefined&&record.id!==null)await fetch(API_RECORDS+'/'+encodeURIComponent(record.id),{method:'DELETE'})}}db=blank();db.officers=officers;localSave();alert('Operational records cleared. Other officers should click Refresh Records or Clear This Device.');showPage('dashboard')}catch(error){alert('Unable to clear shared records. Please check connection.');console.error(error)}}
async function refreshThisDeviceFromCloud(){try{sessionStorage.removeItem('fth_active_page');await loadFromApi();alert('Records refreshed.');showPage('dashboard')}catch(error){alert('Unable to refresh this device.')}}
function deviceReset(){const ok=confirm('This clears only this browser/device cache and logs out. Shared cloud records are not deleted. Continue?');if(!ok)return;Object.keys(localStorage).forEach(k=>{if(k.toLowerCase().includes('fth')||k.toLowerCase().includes('duniq')||k.toLowerCase().includes('workstation'))localStorage.removeItem(k)});sessionStorage.clear();alert('This device has been cleared. Log in again.');location.reload()}
function renderNav(){const tabs=allTabs.filter(t=>(roleTabs[currentRole]||[]).includes(t[0]));document.getElementById('side').innerHTML=tabs.map((t,i)=>'<button class="nav '+(i===0?'active':'')+'" onclick="showPage(\''+t[0]+'\')">'+t[1]+'</button>').join('');document.getElementById('mobileNav').innerHTML=tabs.map(t=>'<option value="'+t[0]+'">'+t[1]+'</option>').join('')}
function markNav(page){document.querySelectorAll('.nav').forEach(n=>n.classList.remove('active'));const t=allTabs.find(x=>x[0]===page);if(t){[...document.querySelectorAll('.nav')].find(n=>n.textContent===t[1])?.classList.add('active')}const m=document.getElementById('mobileNav');if(m)m.value=page;sessionStorage.setItem('fth_active_page',page)}
function renderCurrentPage(){showPage(sessionStorage.getItem('fth_active_page')||'dashboard',false)}
function showPage(page,mark=true){if(mark)markNav(page);if(page==='dashboard')renderDashboardPage();if(page==='quotes')renderQuotesPage();if(page==='invoices')renderInvoicesPage();if(page==='payments')renderPaymentsPage();if(page==='waybills')renderWaybillsPage();if(page==='inventory')renderInventoryPage();if(page==='procurement')renderProcurementPage();if(page==='logistics')renderLogisticsPage();if(page==='followup')renderFollowupPage();if(page==='customers')renderCustomersPage();if(page==='staffAccess')renderStaffPage();if(page==='reports')renderReportsPage();if(page==='archive')renderArchivePage()}
function installPage(html,after){document.getElementById('main').innerHTML=html;document.querySelectorAll('input[type=date]').forEach(i=>{if(!i.value)i.value=today()});if(after)after();applyRoleVisibility()}
function applyRoleVisibility(){document.querySelectorAll('.director-only').forEach(el=>el.style.display=currentRole==='director'?'':'none');document.querySelectorAll('.director-only-inline').forEach(el=>el.style.display=currentRole==='director'?'inline-flex':'none');document.querySelectorAll('.support-only-inline').forEach(el=>el.style.display=currentRole==='support'?'inline-flex':'none')}
async function startApp(){document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';document.getElementById('roleName').textContent=roleNames[currentRole]||currentRole;document.getElementById('officerChip').textContent='Officer: '+currentOfficerName;document.getElementById('dateNow').textContent='Login: '+currentLoginTime;renderNav();showPage('dashboard');try{await loadFromApi();showPage('dashboard')}catch(e){}try{queueSync()}catch(e){}}
function logout(){sessionStorage.removeItem('fth_login');location.reload()}
document.getElementById('loginForm').onsubmit=async function(e){e.preventDefault();const role=document.getElementById('role').value;const token=document.getElementById('pin').value.trim();const duty=document.getElementById('officerDutyName').value.trim();const msg=document.getElementById('loginMsg');msg.textContent='Checking access...';try{await Promise.race([loadFromApi(),new Promise(resolve=>setTimeout(resolve,1800))])}catch(e){}const officer=verifyLogin(role,token);if(!officer){msg.textContent='Invalid role or access token. Use Director 0000, Support 1111, Procurement 2222, Logistics 3333, Social 4444 unless you created new tokens.';return}currentRole=role;currentOfficerName=duty||officer.name||roleNames[role];currentOfficerId=officer.id||'';currentLoginTime=new Date().toLocaleString('en-NG');sessionStorage.setItem('fth_login',JSON.stringify({role:currentRole,officerName:currentOfficerName,officerId:currentOfficerId,loginTime:currentLoginTime}));msg.textContent='Opening workstation...';startApp()};
function roleWorkDescriptionPanel(){const descriptions={director:'<b>Director:</b> Review company activity, approve invoices, payments, waybills, procurement, reports, and sensitive operational decisions before execution.',support:'<b>Business Support Officer:</b> Receive customer requests, create quotes, prepare invoices, enter payment information, prepare delivery handover/waybill drafts, update customer records, inventory records, and submit daily reports to the Director.',procurement:'<b>Procurement Officer:</b> Source products not available in company stock, record supplier/vendor details, confirm price and availability, and submit procurement feedback for Director review.',logistics:'<b>Logistics / Inspection Officer:</b> Handle dispatch updates, truck/driver details, delivery proof, signed waybill uploads, inspection records, and delivery confirmation.',social:'<b>Client Follow-Up Officer:</b> Follow up with customers after quote, payment, delivery, or complaint resolution; record satisfaction checks and testimonials.'};return '<div class="panel"><div class="eyebrow">Duty Reminder</div><h2>Officer Duties & Work Responsibility</h2><p>'+(descriptions[currentRole]||'Authorized officer: Please carry out your assigned role and record all official work inside the workstation.')+'</p></div>'}
function companyRulesPanel(){return '<div class="panel"><div class="eyebrow">Company Rules</div><h2>Company Rules, Data Protection & Confidentiality Reminder</h2><div class="notice"><b>Resumption:</b> Official resumption time is 8:00am. Late resumption without approval or emergency reason may attract a formal query.</div><p>All customer, supplier, vendor, procurement, payment, inventory, logistics, and company records must be entered and maintained inside the FTH D-UNIQ Operations Workstation.</p><p>Officers are not permitted to save customer contacts, supplier contacts, vendor contacts, delivery details, payment information, inventory records, or company transaction details on personal phones, personal notebooks, private WhatsApp chats, or any personal storage space.</p><p>Every officer must save completed work, update the correct status, and give proper handover notes where another officer will continue the task.</p></div>'}
function renderDashboardPage(){const activeInv=db.invoices.filter(i=>i.status!=='Awaiting Director Approval'&&i.status!=='Rejected');const sales=activeInv.reduce((a,b)=>a+Number(b.total||0),0);const paid=db.payments.filter(p=>p.status==='Approved').reduce((a,b)=>a+Number(b.totalPaid||0),0);const outstanding=db.invoices.filter(i=>i.status!=='Rejected').reduce((a,b)=>a+Number(b.balance||0),0);const pi=db.invoices.filter(i=>i.status==='Awaiting Director Approval'),pp=db.payments.filter(p=>p.status==='Awaiting Director Approval'),pw=db.waybills.filter(w=>w.status==='Awaiting Director Approval'),pc=db.procurement.filter(p=>p.status==='Pending Director Approval');const metricHtml=[['Quotes',db.quotes.length],['Approved Sales',money(sales)],['Approved Paid',money(paid)],['Outstanding',money(outstanding)],['Pending Invoices',pi.length],['Pending Payments',pp.length],['Pending Procurement',pc.length],['Customers',db.customers.length]].map(x=>'<div class="metric"><span>'+x[0]+'</span><strong>'+x[1]+'</strong></div>').join('');installPage('<section>'+roleWorkDescriptionPanel()+companyRulesPanel()+'<div class="panel"><div class="eyebrow">Dashboard</div><h2>Business Position</h2><div class="metrics">'+metricHtml+'</div></div><div class="panel director-only"><h2>Director Approval Center</h2>'+approvalList(pi,pp,pw,pc)+'</div><div class="panel"><h2>Recent Workflow Movement</h2>'+workflowTable()+'</div></section>')}
function approvalList(pi,pp,pw,pc){return '<h3>Invoices Awaiting Approval</h3>'+table(pi,['Date','Invoice','Customer','Total','Action'],i=>[niceDate(i.date),i.id,esc(i.customer),money(i.total),'<button class="small green" onclick="approveInvoice(\''+i.id+'\')">Approve</button> <button class="small red" onclick="rejectInvoice(\''+i.id+'\')">Reject</button>'],'No pending invoices.')+'<h3>Payments Awaiting Approval</h3>'+table(pp,['Date','Payment','Invoice','Customer','Amount','Action'],p=>[niceDate(p.date),p.id,p.invoiceId,esc(p.customer),money(p.totalPaid),'<button class="small green" onclick="approvePayment(\''+p.id+'\')">Approve</button> <button class="small red" onclick="rejectPayment(\''+p.id+'\')">Reject</button>'],'No pending payments.')+'<h3>Waybills Awaiting Approval</h3>'+table(pw,['Date','Waybill','Customer','Status','Action'],w=>[niceDate(w.date),w.id,esc(w.customer),statusTag(w.status),'<button class="small green" onclick="approveWaybill(\''+w.id+'\')">Approve</button> <button class="small red" onclick="deleteRecord(\'waybills\',\''+w.id+'\')">Delete</button>'],'No pending waybills.')+'<h3>Procurement Feedback Awaiting Review</h3>'+table(pc,['Date','Record','Vendor','Item','Price','Action'],p=>[niceDate(p.date),p.id,esc(p.vendor),esc(p.item),money(p.sellingPrice||0),'<button class="small green" onclick="approveProcurement(\''+p.id+'\')">Approve</button> <button class="small red" onclick="rejectProcurement(\''+p.id+'\')">Reject</button>'],'No pending procurement feedback.')}
function workflowTable(){const wf=[...db.quotes.map(x=>({date:x.date,ref:x.id,type:'Quote',customer:x.customer,status:x.status})),...db.invoices.map(x=>({date:x.date,ref:x.id,type:'Invoice',customer:x.customer,status:x.status})),...db.payments.map(x=>({date:x.date,ref:x.id,type:'Payment',customer:x.customer,status:x.status})),...db.waybills.map(x=>({date:x.date,ref:x.id,type:'Waybill',customer:x.customer,status:x.status})),...db.procurement.map(x=>({date:x.date,ref:x.id,type:'Procurement',customer:x.customer,status:x.status}))].sort((a,b)=>String(b.date).localeCompare(String(a.date))).slice(0,30);return table(wf,['Date','Ref','Type','Customer','Status'],r=>[niceDate(r.date),r.ref,r.type,esc(r.customer),statusTag(r.status)],'No workflow movement yet.')}
function renderQuotesPage(){installPage('<section><div class="panel"><div class="eyebrow">Customer-Facing / Sales Desk</div><h2>New Quote / Customer Request</h2><form id="quoteForm"><div class="grid"><div><label>Date of Order</label><input name="date" type="date" required></div><div><label>Source of Request</label><select name="source"><option>Website Quote Form</option><option>Walk-in</option><option>Phone Call</option><option>WhatsApp</option><option>Social Media</option><option>Referral</option><option>Director Entry</option></select></div><div><label>Customer Name</label><input name="customer" required></div><div><label>Phone / WhatsApp</label><input name="phone" required></div><div><label>Email Address</label><input name="email" type="email"></div><div><label>Project / Delivery Location</label><input name="location" required></div><div><label>Item / Material / Service</label><select name="item" required>'+productOptionsHtml()+'</select></div><div><label>Quantity</label><input name="quantity" required></div><div><label>Unit</label><select name="unit"><option>Bags</option><option>Pieces</option><option>Trips</option><option>Tonnes</option><option>Square Metres</option><option>Service</option><option>Other</option></select></div><div><label>Delivery Date</label><input name="deliveryDate" type="date"></div><div class="full"><label>Customer Instruction / Details</label><textarea name="details"></textarea></div></div><div class="row"><button class="primary" type="submit">Save Quote Request</button></div></form></div><div class="panel"><h2>Central Quotes</h2>'+renderQuotesTable()+'</div></section>',()=>{document.getElementById('quoteForm').onsubmit=saveQuote})}
function saveQuote(e){e.preventDefault();const data=formData(e.target);const q={id:nextId('quote'),status:'Quote received',createdByRole:currentRole,createdByName:currentOfficerName,...data};db.quotes.unshift(q);upsertCustomer(q);save();alert('Quote saved.')}
function renderQuotesTable(){return table(db.quotes,['Date','Quote','Customer','Location','Item','Qty','Status','Action'],q=>[niceDate(q.date),q.id,esc(q.customer)+'<br><small>'+esc(q.phone)+'</small>',esc(q.location),esc(q.item),esc(q.quantity)+' '+esc(q.unit),statusTag(q.status),'<button class="small secondary" onclick="sendQuoteToInvoice(\''+q.id+'\')">Create Invoice</button> <button class="small red" onclick="deleteRecord(\'quotes\',\''+q.id+'\')">Delete</button>'],'No quotes yet.')}
function sendQuoteToInvoice(qid){showPage('invoices');setTimeout(()=>{const s=document.getElementById('invoiceQuoteSelect');if(s){s.value=qid;fillInvoiceFromQuote(qid)}},80)}
function renderInvoicesPage(){installPage('<section><div class="panel"><div class="eyebrow">Invoice / Sales Ledger</div><h2>Create Invoice</h2><form id="invoiceForm"><div class="grid"><div><label>Invoice Date</label><input name="date" type="date" required></div><div><label>From Quote</label><select name="quoteId" id="invoiceQuoteSelect"><option value="">Manual invoice</option>'+db.quotes.map(q=>'<option value="'+q.id+'">'+q.id+' — '+esc(q.customer)+'</option>').join('')+'</select></div><div><label>Customer Name</label><input name="customer" required></div><div><label>Phone / WhatsApp</label><input name="phone" required></div><div><label>Location</label><input name="location" required></div><div><label>Item / Description</label><input name="desc" required></div><div><label>Quantity</label><input name="qty" type="number" step="0.01" required></div><div><label>Unit</label><select name="unit"><option>Bags</option><option>Pieces</option><option>Trips</option><option>Tonnes</option><option>Square Metres</option><option>Service</option><option>Other</option></select></div><div><label>Rate</label><input name="rate" type="number" step="0.01" required></div><div><label>Logistics Fee</label><input name="logisticsFee" type="number" step="0.01" value="0"></div><div><label>Discount</label><input name="discount" type="number" step="0.01" value="0"></div><div><label>Delivery Date</label><input name="deliveryDate" type="date"></div><div class="full"><label>Invoice / Delivery Note</label><textarea name="note"></textarea></div></div><div class="row"><button class="primary" type="submit">Submit Invoice for Director Approval</button></div></form></div><div class="panel"><h2>Invoice / Sales Ledger Records</h2>'+renderInvoicesTable()+'</div></section>',()=>{document.getElementById('invoiceQuoteSelect').onchange=e=>fillInvoiceFromQuote(e.target.value);document.getElementById('invoiceForm').onsubmit=saveInvoice})}
function fillInvoiceFromQuote(qid){const q=db.quotes.find(x=>x.id===qid);if(!q)return;const f=document.getElementById('invoiceForm');f.customer.value=q.customer||'';f.phone.value=q.phone||'';f.location.value=q.location||'';f.desc.value=q.item||'';f.qty.value=q.quantity||'';f.unit.value=q.unit||'Bags';f.deliveryDate.value=q.deliveryDate||'';f.note.value=q.details||''}
function saveInvoice(e){e.preventDefault();const data=formData(e.target);const amount=Number(data.qty||0)*Number(data.rate||0);const logisticsFee=Number(data.logisticsFee||0);const discount=Number(data.discount||0);const total=Math.max(amount+logisticsFee-discount,0);const status=currentRole==='director'?'Approved':'Awaiting Director Approval';const inv={id:nextId('invoice'),status,total,paid:0,balance:total,amount,createdByName:currentOfficerName,...data};db.invoices.unshift(inv);const q=db.quotes.find(x=>x.id===data.quoteId);if(q)q.status='Invoice created - '+status;upsertCustomer(inv);save();alert('Invoice submitted.')}
function renderInvoicesTable(){return table(db.invoices,['Date','Invoice','Customer','Item','Total','Paid','Balance','Status','Actions'],i=>[niceDate(i.date),i.id,esc(i.customer)+'<br><small>'+esc(i.phone)+'</small>',esc(i.qty+' '+i.unit+' '+i.desc+' @ '+money(i.rate)),money(i.total),money(i.paid),money(i.balance),statusTag(i.status),invoiceActions(i)],'No invoices yet.')}
function invoiceActions(i){let a='';if(currentRole==='director'&&i.status==='Awaiting Director Approval')a+='<button class="small green" onclick="approveInvoice(\''+i.id+'\')">Approve</button> <button class="small red" onclick="rejectInvoice(\''+i.id+'\')">Reject</button> ';if(['Approved','Paid','Part Paid'].includes(i.status))a+='<button class="small secondary" onclick="printInvoice(\''+i.id+'\')">Print</button> ';a+='<button class="small red" onclick="deleteRecord(\'invoices\',\''+i.id+'\')">Delete</button>';return a}
function approveInvoice(iid){if(currentRole!=='director')return alert('Only Director can approve invoices.');const i=db.invoices.find(x=>x.id===iid);if(i){i.status='Approved';i.approvedBy=currentOfficerName;save()}}
function rejectInvoice(iid){if(currentRole!=='director')return alert('Only Director can reject invoices.');const i=db.invoices.find(x=>x.id===iid);if(i){i.status='Rejected';save()}}
function renderPaymentsPage(){installPage('<section><div class="panel"><div class="eyebrow">Payments / Receipts</div><h2>Payment Confirmation</h2><form id="paymentForm"><div class="grid"><div><label>Select Approved Invoice</label><select name="invoiceId" id="paymentInvoiceSelect" required><option value="">Select approved invoice</option>'+db.invoices.filter(i=>(i.status==='Approved'||i.status==='Part Paid')&&Number(i.balance)>0).map(i=>'<option value="'+i.id+'">'+i.id+' — '+esc(i.customer)+' — Balance '+money(i.balance)+'</option>').join('')+'</select></div><div><label>Customer</label><input name="customer" readonly></div><div><label>Current Balance</label><input name="currentBalance" readonly></div><div><label>Transfer Amount</label><input name="transferAmount" type="number" step="0.01" value="0"></div><div><label>Cash Amount</label><input name="cashAmount" type="number" step="0.01" value="0"></div><div><label>POS Amount</label><input name="posAmount" type="number" step="0.01" value="0"></div><div><label>Payment Date</label><input name="date" type="date" required></div><div class="full"><label>Payment Note</label><textarea name="note"></textarea></div></div><div class="row"><button class="primary" type="submit">Submit Payment for Director Approval</button></div></form></div><div class="panel"><h2>Payment Records</h2>'+renderPaymentsTable()+'</div><div class="panel"><h2>Receipts / Acknowledgements</h2>'+renderReceiptsTable()+'</div></section>',()=>{document.getElementById('paymentInvoiceSelect').onchange=function(){const inv=db.invoices.find(i=>i.id===this.value);if(!inv)return;const f=document.getElementById('paymentForm');f.customer.value=inv.customer;f.currentBalance.value=inv.balance};document.getElementById('paymentForm').onsubmit=savePayment})}
function savePayment(e){e.preventDefault();const data=formData(e.target);const inv=db.invoices.find(i=>i.id===data.invoiceId);if(!inv)return alert('Select a valid approved invoice.');const totalPaid=Number(data.transferAmount||0)+Number(data.cashAmount||0)+Number(data.posAmount||0);if(totalPaid<=0)return alert('Enter a payment amount.');db.payments.unshift({id:nextId('payment'),status:'Awaiting Director Approval',invoiceId:inv.id,customer:inv.customer,phone:inv.phone,totalPaid,createdByName:currentOfficerName,...data});save();alert('Payment submitted for Director approval.')}
function renderPaymentsTable(){return table(db.payments,['Date','Payment','Invoice','Customer','Amount','Status','Action'],p=>[niceDate(p.date),p.id,p.invoiceId,esc(p.customer),money(p.totalPaid),statusTag(p.status),currentRole==='director'&&p.status==='Awaiting Director Approval'?'<button class="small green" onclick="approvePayment(\''+p.id+'\')">Approve</button> <button class="small red" onclick="rejectPayment(\''+p.id+'\')">Reject</button>':'-'],'No payment records yet.')}
function approvePayment(pid){if(currentRole!=='director')return alert('Only Director can approve payments.');const p=db.payments.find(x=>x.id===pid);const inv=db.invoices.find(i=>i.id===(p?p.invoiceId:''));if(!p||!inv||p.status==='Approved')return;p.status='Approved';p.approvedBy=currentOfficerName;inv.paid=Number(inv.paid||0)+Number(p.totalPaid||0);inv.balance=Math.max(Number(inv.total||0)-Number(inv.paid||0),0);inv.status=inv.balance<=0?'Paid':'Part Paid';db.receipts.unshift({id:nextId('receipt'),date:today(),invoiceId:inv.id,paymentId:p.id,customer:inv.customer,phone:inv.phone,receiptType:inv.balance<=0?'Payment Receipt':'Part-Payment Acknowledgement',amount:p.totalPaid,balance:inv.balance});save()}
function rejectPayment(pid){if(currentRole!=='director')return alert('Only Director can reject payments.');const p=db.payments.find(x=>x.id===pid);if(p){p.status='Rejected';save()}}
function renderReceiptsTable(){return table(db.receipts,['Date','Receipt','Type','Invoice','Customer','Amount','Balance','Action'],r=>[niceDate(r.date),r.id,esc(r.receiptType),r.invoiceId,esc(r.customer),money(r.amount),money(r.balance),'<button class="small secondary" onclick="printReceipt(\''+r.id+'\')">Print</button>'],'No approved receipts yet.')}
function renderWaybillsPage(){installPage('<section><div class="panel"><div class="eyebrow">Delivery / Logistics Handover Desk</div><h2>Create Waybill / Delivery Instruction</h2><form id="waybillForm"><div class="grid"><div><label>Select Invoice</label><select name="invoiceId" id="waybillInvoiceSelect" required><option value="">Select invoice</option>'+db.invoices.filter(i=>['Paid','Part Paid','Approved'].includes(i.status)).map(i=>'<option value="'+i.id+'">'+i.id+' — '+esc(i.customer)+'</option>').join('')+'</select></div><div><label>Waybill Date</label><input name="date" type="date" required></div><div><label>Customer</label><input name="customer" required></div><div><label>Phone</label><input name="phone" required></div><div><label>Location</label><input name="location" required></div><div><label>Logistics Fee</label><input name="logisticsFee" type="number" step="0.01" value="0"></div><div><label>Delivery Date</label><input name="deliveryDate" type="date"></div><div class="full"><label>Products / Materials for Delivery</label><textarea name="products" required></textarea></div><div class="full"><label>Delivery Instruction</label><textarea name="instruction"></textarea></div></div><div class="row"><button class="primary" type="submit">Submit Waybill for Director Approval</button></div></form></div><div class="panel"><h2>Waybill / Delivery Records</h2>'+renderWaybillsTable()+'</div></section>',()=>{document.getElementById('waybillInvoiceSelect').onchange=e=>fillWaybillFromInvoice(e.target.value);document.getElementById('waybillForm').onsubmit=saveWaybill})}
function fillWaybillFromInvoice(id){const inv=db.invoices.find(i=>i.id===id);if(!inv)return;const f=document.getElementById('waybillForm');f.customer.value=inv.customer;f.phone.value=inv.phone;f.location.value=inv.location;f.logisticsFee.value=inv.logisticsFee||0;f.deliveryDate.value=inv.deliveryDate||'';f.products.value=(inv.qty||'')+' '+(inv.unit||'')+' '+(inv.desc||'');f.instruction.value=inv.note||''}
function saveWaybill(e){e.preventDefault();const data=formData(e.target);const status=currentRole==='director'?'Approved for Dispatch':'Awaiting Director Approval';db.waybills.unshift({id:nextId('waybill'),status,createdByName:currentOfficerName,...data});save();alert('Waybill submitted.')}
function renderWaybillsTable(){return table(db.waybills,['Date','Waybill','Invoice','Customer','Location','Products','Status','Actions'],w=>[niceDate(w.date),w.id,w.invoiceId,esc(w.customer),esc(w.location),esc(w.products).split('\n').join('<br>'),statusTag(w.status),waybillActions(w)],'No waybills yet.')}
function waybillActions(w){let a='';if(currentRole==='director'&&w.status==='Awaiting Director Approval')a+='<button class="small green" onclick="approveWaybill(\''+w.id+'\')">Approve</button> ';if((currentRole==='director'||currentRole==='logistics')&&w.status!=='Awaiting Director Approval')a+='<button class="small secondary" onclick="printWaybill(\''+w.id+'\')">Print</button> ';if((currentRole==='director'||currentRole==='logistics')&&w.status==='Approved for Dispatch')a+='<button class="small blue" onclick="quickDispatch(\''+w.id+'\')">Dispatch</button> ';a+='<button class="small red" onclick="deleteRecord(\'waybills\',\''+w.id+'\')">Delete</button>';return a}
function approveWaybill(wid){if(currentRole!=='director')return alert('Only Director can approve dispatch.');const w=db.waybills.find(x=>x.id===wid);if(w){w.status='Approved for Dispatch';w.approvedBy=currentOfficerName;save()}}
function quickDispatch(wid){const w=db.waybills.find(x=>x.id===wid);if(w){w.status='Dispatched';save()}}
function renderInventoryPage(){installPage('<section><div class="panel"><div class="eyebrow">Inventory / Stock Desk</div><h2>Stock Movement Ledger</h2><form id="stockForm"><div class="grid"><div><label>Date</label><input name="date" type="date" required></div><div><label>Product / Material</label><select name="item" required>'+productOptionsHtml()+'</select></div><div><label>Movement Type</label><select name="type"><option>Opening Stock</option><option>Received Product</option><option>Produced Product</option><option>Sales Out</option><option>Damage / Loss</option><option>Shortage</option><option>Excess</option><option>Adjustment</option></select></div><div><label>Quantity</label><input name="qty" type="number" step="0.01" required></div><div><label>Unit</label><select name="unit"><option>Bags</option><option>Pieces</option><option>Trips</option><option>Tonnes</option><option>Square Metres</option><option>Units</option></select></div><div><label>Location</label><input name="location" value="Micfen Global Enterprise Limited site, Plot 627A" required></div><div class="full"><label>Notes</label><textarea name="notes"></textarea></div></div><div class="row"><button class="primary" type="submit">Record Stock Movement</button></div></form></div><div class="panel"><h2>Current Stock Position</h2>'+renderStockPosition()+'</div><div class="panel"><h2>Stock Movement Records</h2>'+renderStockTable()+'</div></section>',()=>{document.getElementById('stockForm').onsubmit=saveStock})}
function saveStock(e){e.preventDefault();const data=formData(e.target);db.stock.unshift({id:nextId('stock'),enteredBy:currentOfficerName,...data,qty:Number(data.qty||0)});save()}
function stockSign(type){return['Sales Out','Damage / Loss','Shortage'].includes(type)?-1:1}
function stockPosition(){const map={};db.stock.forEach(m=>{const k=String(m.item||'').toLowerCase();if(!map[k])map[k]={item:m.item,qty:0,unit:m.unit};map[k].qty+=Number(m.qty||0)*stockSign(m.type);map[k].unit=m.unit});return Object.values(map)}
function renderStockPosition(){return table(stockPosition(),['Product / Material','Closing Stock','Unit'],s=>[esc(s.item),String(s.qty),esc(s.unit)],'No stock position yet.')}
function renderStockTable(){return table(db.stock,['Date','Stock ID','Item','Type','Qty','Unit','Location','Action'],s=>[niceDate(s.date),s.id,esc(s.item),statusTag(s.type),String(s.qty),esc(s.unit),esc(s.location),'<button class="small red" onclick="deleteRecord(\'stock\',\''+s.id+'\')">Delete</button>'],'No stock movement yet.')}
function renderProcurementPage(){installPage('<section><div class="panel"><div class="eyebrow">Procurement Officer</div><h2>Procurement / Sourcing Register</h2><form id="procurementForm"><div class="grid"><div><label>Date</label><input name="date" type="date" required></div><div><label>Customer Name, if linked</label><input name="customer"></div><div><label>Material / Product</label><select name="item" required>'+productOptionsHtml()+'</select></div><div><label>Quantity</label><input name="qty" type="number" step="0.01" required></div><div><label>Unit</label><select name="unit"><option>Bags</option><option>Pieces</option><option>Trips</option><option>Tonnes</option><option>Square Metres</option><option>Units</option></select></div><div><label>Supplier / Vendor</label><input name="vendor"></div><div><label>Vendor Cost Price</label><input name="costPrice" type="number" step="0.01"></div><div><label>Suggested Selling Price</label><input name="sellingPrice" type="number" step="0.01"></div><div class="full"><label>Procurement Feedback / Remarks</label><textarea name="feedback"></textarea></div></div><div class="row"><button class="primary" type="submit">Submit Procurement Record</button></div></form></div><div class="panel"><h2>Procurement Records</h2>'+renderProcurementTable()+'</div></section>',()=>{document.getElementById('procurementForm').onsubmit=saveProcurement})}
function saveProcurement(e){e.preventDefault();const data=formData(e.target);const status=currentRole==='director'?'Approved':'Pending Director Approval';db.procurement.unshift({id:nextId('procurement'),status,createdByName:currentOfficerName,...data});save();alert('Procurement record submitted.')}
function renderProcurementTable(){return table(db.procurement,['Date','Record','Customer','Vendor','Item','Qty','Cost','Suggested Selling','Status','Action'],p=>[niceDate(p.date),p.id,esc(p.customer||'-'),esc(p.vendor||'-'),esc(p.item),esc(p.qty+' '+p.unit),money(p.costPrice||0),money(p.sellingPrice||0),statusTag(p.status),procurementActions(p)],'No procurement records yet.')}
function procurementActions(p){let a='';if(currentRole==='director'&&p.status==='Pending Director Approval')a+='<button class="small green" onclick="approveProcurement(\''+p.id+'\')">Approve</button> <button class="small red" onclick="rejectProcurement(\''+p.id+'\')">Reject</button> ';a+='<button class="small red" onclick="deleteRecord(\'procurement\',\''+p.id+'\')">Delete</button>';return a}
function approveProcurement(pid){const p=db.procurement.find(x=>x.id===pid);if(currentRole!=='director')return alert('Only Director can approve procurement.');if(p){p.status='Approved';save()}}
function rejectProcurement(pid){const p=db.procurement.find(x=>x.id===pid);if(currentRole!=='director')return alert('Only Director can reject procurement.');if(p){p.status='Rejected';save()}}
function renderLogisticsPage(){installPage('<section><div class="panel"><div class="eyebrow">Logistics / Inspection Officer</div><h2>Delivery Dispatch Update</h2><form id="logisticsForm"><div class="grid"><div><label>Select Waybill</label><select name="waybillId" required><option value="">Select approved waybill</option>'+db.waybills.filter(w=>w.status!=='Closed'&&w.status!=='Awaiting Director Approval').map(w=>'<option value="'+w.id+'">'+w.id+' — '+esc(w.customer)+' — '+esc(w.status)+'</option>').join('')+'</select></div><div><label>Status</label><select name="status"><option>Dispatched</option><option>In Transit</option><option>Delivered</option><option>Signed Waybill Uploaded</option><option>Goods Confirmed and Supplied</option><option>Closed</option></select></div><div><label>Vehicle Capacity</label><input name="vehicleCapacity"></div><div><label>Driver / Truck Details</label><input name="driverDetails"></div><div><label>Dispatch Date</label><input name="dispatchDate" type="date" required></div><div class="full"><label>Remarks</label><textarea name="remarks"></textarea></div></div><div class="row"><button class="primary" type="submit">Update Delivery Record</button></div></form></div><div class="panel"><h2>Delivery / Logistics Jobs</h2>'+renderLogisticsTable()+'</div></section>',()=>{document.getElementById('logisticsForm').onsubmit=saveLogistics})}
function saveLogistics(e){e.preventDefault();const data=formData(e.target);const w=db.waybills.find(x=>x.id===data.waybillId);if(!w)return alert('Select a valid approved waybill.');if(w.status==='Awaiting Director Approval')return alert('Director approval is required before logistics can proceed.');db.logistics.unshift({id:nextId('logistics'),waybillId:w.id,invoiceId:w.invoiceId,customer:w.customer,location:w.location,updatedByName:currentOfficerName,...data});Object.assign(w,{status:data.status,vehicleCapacity:data.vehicleCapacity,driverDetails:data.driverDetails,dispatchDate:data.dispatchDate});save()}
function renderLogisticsTable(){return table(db.waybills,['Waybill','Invoice','Customer','Location','Status','Vehicle','Driver','Action'],w=>[w.id,w.invoiceId,esc(w.customer),esc(w.location),statusTag(w.status),esc(w.vehicleCapacity||'-'),esc(w.driverDetails||'-'),'<button class="small red" onclick="deleteLogisticsForWaybill(\''+w.id+'\')">Delete Updates</button>'],'No logistics jobs yet.')}
function deleteLogisticsForWaybill(wid){if(!(currentRole==='director'||currentRole==='logistics'))return;if(!confirm('Delete logistics updates for this waybill?'))return;db.logistics=db.logistics.filter(x=>x.waybillId!==wid);save()}
function renderFollowupPage(){installPage('<section><div class="panel"><div class="eyebrow">Client Follow-Up</div><h2>Customer Follow-Up Desk</h2><form id="followupForm"><div class="grid"><div><label>Date</label><input name="date" type="date" required></div><div><label>Customer Name</label><input name="customer" required></div><div><label>Phone / WhatsApp</label><input name="phone"></div><div><label>Purpose</label><select name="purpose"><option>After Delivery Satisfaction Check</option><option>Thank You Message</option><option>Balance Reminder</option><option>Complaint Follow-Up</option><option>Testimonial / Review Request</option><option>Reorder Reminder</option></select></div><div><label>Outcome</label><select name="outcome"><option>Message Prepared</option><option>Message Sent</option><option>Customer Replied</option><option>Customer Did Not Reply</option><option>Customer Was Satisfied</option><option>Customer Complained</option><option>Escalated to Director</option></select></div><div><label>Next Follow-Up Date</label><input name="nextFollowupDate" type="date"></div><div class="full"><label>Follow-Up Notes / Message</label><textarea name="notes"></textarea></div></div><div class="row"><button class="primary" type="submit">Submit Follow-Up Report</button></div></form></div><div class="panel"><h2>Follow-Up Records</h2>'+renderFollowupsTable()+'</div></section>',()=>{document.getElementById('followupForm').onsubmit=saveFollowup})}
function saveFollowup(e){e.preventDefault();const data=formData(e.target);db.followups.unshift({id:nextId('followup'),createdByName:currentOfficerName,...data});save()}
function renderFollowupsTable(){return table(db.followups,['Date','ID','Customer','Phone','Purpose','Outcome','Next Date','Notes','Action'],f=>[niceDate(f.date),f.id,esc(f.customer),esc(f.phone),esc(f.purpose),statusTag(f.outcome),niceDate(f.nextFollowupDate),esc(f.notes||'-'),'<button class="small red" onclick="deleteRecord(\'followups\',\''+f.id+'\')">Delete</button>'],'No follow-up records yet.')}
function renderCustomersPage(){db.customers.forEach(refreshCustomer);installPage('<section><div class="panel"><div class="eyebrow">Customer Profiles</div><h2>Customer Auto-Fill / History</h2>'+table(db.customers,['Customer','Phone','Email','Locations','Quotes','Invoices','Outstanding','Last Order','Action'],c=>[esc(c.name),esc(c.phone),esc(c.email||'-'),(c.locations||[]).map(esc).join('<br>')||'-',String((c.quoteIds||[]).length),String((c.invoiceIds||[]).length),money(c.outstandingBalance),niceDate(c.lastOrderDate),currentRole==='director'?'<button class="small red" onclick="deleteRecord(\'customers\',\''+c.id+'\')">Delete</button>':'-'],'No customer profiles yet.')+'</div></section>')}
function renderStaffPage(){installPage('<section><div class="panel director-only"><div class="eyebrow">Director Access Control</div><h2>Officer Profiles / Tokens</h2><form id="officerForm"><div class="grid"><div><label>Officer Role</label><select name="role" required><option value="support">Business Support Officer</option><option value="procurement">Procurement Officer</option><option value="logistics">Logistics / Inspection Officer</option><option value="social">Client Follow-Up Officer</option><option value="director">Director</option></select></div><div><label>Officer Name</label><input name="name" required></div><div><label>Access Token</label><input name="token" id="officerToken" required></div><div><label>Status</label><select name="status"><option>Active</option><option>Inactive</option></select></div></div><div class="row"><button type="button" class="secondary" onclick="generateOfficerToken()">Generate Token</button><button class="primary" type="submit">Save Officer Profile</button></div></form></div><div class="panel director-only"><h2>Registered Officers</h2>'+table(db.officers,['Role','Officer Name','Token','Status','Actions'],o=>[esc(roleNames[o.role]||o.role),esc(o.name),esc(o.token),statusTag(o.status),'<button class="small secondary" onclick="resetOfficerToken(\''+o.id+'\')">New Token</button> <button class="small red" onclick="deactivateOfficer(\''+o.id+'\')">Deactivate</button> <button class="small red" onclick="deleteRecord(\'officers\',\''+o.id+'\')">Wipe</button>'],'No registered officers yet. Default demo PINs are still active.')+'</div></section>',()=>{document.getElementById('officerForm').onsubmit=saveOfficer})}
function generateOfficerToken(){document.getElementById('officerToken').value=Math.random().toString(36).slice(2,8).toUpperCase()}
function saveOfficer(e){e.preventDefault();if(currentRole!=='director')return alert('Only Director can manage officer profiles.');const data=formData(e.target);const old=db.officers.find(o=>o.role===data.role&&o.name.toLowerCase()===data.name.toLowerCase());if(old)Object.assign(old,data);else db.officers.unshift({id:nextId('officer'),...data});save();alert('Officer profile saved.')}
function resetOfficerToken(oid){const o=db.officers.find(x=>x.id===oid);if(o){o.token=Math.random().toString(36).slice(2,8).toUpperCase();o.status='Active';save();alert('New token: '+o.token)}}
function deactivateOfficer(oid){const o=db.officers.find(x=>x.id===oid);if(o){o.status='Inactive';save()}}
function renderReportsPage(){installPage('<section><div class="panel"><div class="eyebrow">Reports</div><h2>Daily, Weekly & Monthly Reports</h2><div class="grid4"><div><label>Daily Report Date</label><input id="reportDate" type="date"></div></div><div class="row"><button class="primary" type="button" onclick="renderDailyReport()">Generate Daily Report</button><button class="secondary director-only-inline" type="button" onclick="printCurrentReport()">Director Print / Save PDF</button><button class="dark director-only-inline" type="button" onclick="archiveCurrentReport()">Director Archive Current Report</button><button class="green support-only-inline" type="button" onclick="submitDailyReportToDirector()">Submit Daily Report to Director</button><button class="red director-only-inline" type="button" onclick="clearOperationalData()">Director Clear Shared Data</button></div><div class="notice">Business Support can submit daily report to Director. Clearing shared data is Director-only.</div></div><div id="reportBox"></div></section>');document.getElementById('reportDate').value=today();renderDailyReport()}
let currentReportHtml='',currentReportTitle='';
function dayStats(date){const invoices=db.invoices.filter(i=>i.date===date&&i.status!=='Awaiting Director Approval'&&i.status!=='Rejected');const payments=db.payments.filter(p=>p.date===date&&p.status==='Approved');return{date,quotes:db.quotes.filter(x=>x.date===date).length,invoices:invoices.length,sales:invoices.reduce((a,b)=>a+Number(b.total||0),0),paid:payments.reduce((a,b)=>a+Number(b.totalPaid||0),0),balance:invoices.reduce((a,b)=>a+Number(b.balance||0),0),waybills:db.waybills.filter(x=>x.date===date).length,followups:db.followups.filter(x=>x.date===date).length}}
function dailyReportHtml(date){const s=dayStats(date);return '<div class="panel"><div class="document-logo-wrap"><img src="'+LOGO_PATH+'" class="document-logo"></div><h2>FTH D-UNIQ Daily Operations Report</h2><p><b>Date:</b> '+niceDate(date)+'</p>'+table([s],['Quotes','Invoices','Sales','Paid','Balance','Waybills','Follow-ups'],x=>[x.quotes,x.invoices,money(x.sales),money(x.paid),money(x.balance),x.waybills,x.followups])+'<h3>Sales Breakdown</h3>'+table(db.invoices.filter(i=>i.date===date),['Invoice','Customer','Total','Paid','Balance','Status'],i=>[i.id,esc(i.customer),money(i.total),money(i.paid),money(i.balance),statusTag(i.status)],'No sales for this date.')+'</div>'}
function renderDailyReport(){const d=document.getElementById('reportDate')?.value||today();currentReportHtml=dailyReportHtml(d);currentReportTitle='Daily Report '+d;document.getElementById('reportBox').innerHTML=currentReportHtml}
function printCurrentReport(){if(currentRole!=='director')return alert('Only Director can print reports.');if(!currentReportHtml)renderDailyReport();printWin(currentReportHtml,currentReportTitle)}
function archiveCurrentReport(){if(currentRole!=='director')return alert('Only Director can archive reports.');if(!currentReportHtml)renderDailyReport();db.archives.unshift({id:nextId('archive'),date:today(),type:currentReportTitle,title:currentReportTitle,html:currentReportHtml});save();alert('Report archived.')}
function submitDailyReportToDirector(){if(currentRole!=='support')return alert('Only Business Support can submit daily report.');db.dailySubmissions.unshift({id:nextId('report'),date:document.getElementById('reportDate')?.value||today(),submittedBy:currentOfficerName,status:'Submitted to Director Dashboard'});save();alert('Daily report submitted.')}
function renderArchivePage(){installPage('<section><div class="panel"><div class="eyebrow">Director Archive</div><h2>Archived Reports</h2>'+table(db.archives,['Date','Archive ID','Type','Title','Action'],a=>[niceDate(a.date),a.id,esc(a.type),esc(a.title),'<button class="small secondary" onclick="printArchive(\''+a.id+'\')">Print</button>'],'No archived report yet.')+'</div></section>')}
function printArchive(aid){const a=db.archives.find(x=>x.id===aid);if(a)printWin(a.html,a.title)}
function printWin(content,title){const w=window.open('','_blank');const js='<scr'+'ipt>window.onload=function(){setTimeout(function(){window.print()},400)}</scr'+'ipt>';w.document.write('<html><head><title>'+esc(title)+'</title><style>@page{size:A4;margin:14mm}body{font-family:Arial,sans-serif;margin:0;padding:0;color:#1b1714}.panel{max-width:900px;margin:auto}table{width:100%;border-collapse:collapse;font-size:11px}th,td{border:1px solid #999;padding:7px;text-align:left;vertical-align:top}th{background:#eee}.notice{border:1px solid #d4a62a;padding:10px;border-radius:8px;margin-top:10px;font-size:11px;line-height:1.5}.document-logo{width:55px!important;max-width:55px!important;height:auto!important}@media print{button{display:none!important}}</style></head><body>'+content+js+'</body></html>');w.document.close()}
function invoiceHtml(i){return '<div class="panel"><h2>FTH D-UNIQ Customer Invoice</h2><p><b>Invoice:</b> '+i.id+'<br><b>Customer:</b> '+esc(i.customer)+'<br><b>Phone:</b> '+esc(i.phone)+'<br><b>Location:</b> '+esc(i.location)+'</p>'+table([{x:1}],['Description','Qty','Unit','Rate','Amount'],()=>[esc(i.desc),esc(i.qty),esc(i.unit),money(i.rate),money(i.amount)])+'<p><b>Total:</b> '+money(i.total)+'<br><b>Paid:</b> '+money(i.paid)+'<br><b>Balance:</b> '+money(i.balance)+'</p><p><b>Payment Account:</b><br>Providus Bank — FTH D-UNIQ — 4208676962</p></div>'}
function receiptHtml(r){return '<div class="panel"><h2>FTH D-UNIQ '+esc(r.receiptType)+'</h2><p><b>Receipt:</b> '+r.id+'<br><b>Invoice:</b> '+r.invoiceId+'<br><b>Customer:</b> '+esc(r.customer)+'<br><b>Amount Paid:</b> '+money(r.amount)+'<br><b>Balance:</b> '+money(r.balance)+'</p></div>'}
function waybillHtml(w){return '<div class="panel"><h2>FTH D-UNIQ Delivery Waybill</h2><p><b>Waybill:</b> '+w.id+'<br><b>Invoice:</b> '+esc(w.invoiceId)+'<br><b>Customer:</b> '+esc(w.customer)+'<br><b>Phone:</b> '+esc(w.phone)+'<br><b>Location:</b> '+esc(w.location)+'</p><p><b>Products:</b><br>'+esc(w.products).split('\n').join('<br>')+'</p><p><b>Status:</b> '+esc(w.status)+'</p></div>'}
function printInvoice(iid){const i=db.invoices.find(x=>x.id===iid);if(!i||i.status==='Awaiting Director Approval'||i.status==='Rejected')return alert('Invoice must be approved before printing.');printWin(invoiceHtml(i),'Invoice '+iid)}
function printReceipt(rid){const r=db.receipts.find(x=>x.id===rid);if(r)printWin(receiptHtml(r),'Receipt '+rid)}
function printWaybill(wid){const w=db.waybills.find(x=>x.id===wid);if(!w||w.status==='Awaiting Director Approval')return alert('Waybill must be approved before printing.');printWin(waybillHtml(w),'Waybill '+wid)}
async function deleteRecord(collection,idv){if(!db[collection])return;if(currentRole!=='director'&&!['quotes','stock','followups'].includes(collection))return alert('Only Director can delete approved or sensitive records.');if(!confirm('Delete/correct this record?'))return;const item=db[collection].find(x=>x.id===idv);await deleteCloudRecord(item);db[collection]=db[collection].filter(x=>x.id!==idv);localSave();renderCurrentPage()}
const oldLogin=sessionStorage.getItem('fth_login');if(oldLogin){try{const l=JSON.parse(oldLogin);if(l.role){currentRole=l.role;currentOfficerName=l.officerName||roleNames[l.role];currentOfficerId=l.officerId||'';currentLoginTime=l.loginTime||new Date().toLocaleString('en-NG');startApp()}}catch(e){}}
</script>
</body>
</html>
